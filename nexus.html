<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="VV NEXUS">
<title>VV NEXUS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    background: #050508;
    color: #fff;
    font-family: -apple-system, sans-serif;
    padding: env(safe-area-inset-top,20px) 0 env(safe-area-inset-bottom,0px);
    min-height: 100vh;
}

/* Header */
.hdr {
    background: #0a0a12;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.hdr-title { font-size: 18px; font-weight: 900; letter-spacing: 2px; color: #D4AF37; }
.hdr-dot { width: 10px; height: 10px; border-radius: 50%; background: #333; }
.hdr-dot.on { background: #34c759; }

/* Pagini */
.page { display: none; padding: 16px; }
.page.active { display: block; }

/* Card */
.card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 14px;
}
.card-title {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
    font-weight: 700;
    margin-bottom: 14px;
}

/* Inputs */
input[type=text], input[type=password], textarea {
    display: block;
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 14px;
    color: #fff;
    font-size: 15px;
    font-family: -apple-system, sans-serif;
    outline: none;
    -webkit-appearance: none;
    margin-bottom: 10px;
}
input:focus, textarea:focus {
    border-color: #D4AF37;
}
textarea {
    resize: none;
    min-height: 80px;
    line-height: 1.5;
}
label {
    display: block;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    margin-bottom: 6px;
}
.hint {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    line-height: 1.6;
    margin-bottom: 14px;
}

/* Butoane */
.btn {
    display: block;
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.5px;
    cursor: pointer;
    margin-bottom: 10px;
    -webkit-appearance: none;
    text-align: center;
    min-height: 52px;
    touch-action: manipulation;
}
.btn-white { background: #fff; color: #000; }
.btn-gold  { background: rgba(212,175,55,0.15); border: 1px solid rgba(212,175,55,0.3); color: #D4AF37; }
.btn-green { background: rgba(52,199,89,0.15); border: 1px solid rgba(52,199,89,0.3); color: #34c759; }
.btn-red   { background: rgba(255,59,48,0.12); border: 1px solid rgba(255,59,48,0.25); color: #ff3b30; }
.btn-gray  { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.4); }

/* Nav tabs */
.nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: #0a0a12;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom, 0px);
}
.nav-btn {
    flex: 1;
    padding: 12px 4px;
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.3);
    cursor: pointer;
    border: none;
    background: transparent;
    -webkit-appearance: none;
    touch-action: manipulation;
    min-height: 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
}
.nav-btn.active { color: #D4AF37; }
.nav-icon { font-size: 18px; }

/* Chat messages */
.chat-box {
    padding-bottom: 120px;
}
.msg-wrap { margin-bottom: 12px; }
.msg-wrap.user { text-align: right; }
.msg-wrap.ai   { text-align: left; }
.msg-wrap.sys  { text-align: center; }
.msg-who { font-size: 9px; color: rgba(255,255,255,0.25); letter-spacing: 2px; margin-bottom: 4px; }
.msg-wrap.user .msg-who { color: rgba(212,175,55,0.4); }
.msg-wrap.ai   .msg-who { color: rgba(10,132,255,0.4); }
.msg-bub {
    display: inline-block;
    max-width: 88%;
    padding: 12px 15px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    text-align: left;
}
.msg-wrap.user .msg-bub { background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.2); border-bottom-right-radius: 4px; }
.msg-wrap.ai   .msg-bub { background: rgba(10,132,255,0.08); border: 1px solid rgba(10,132,255,0.18); border-bottom-left-radius: 4px; }
.msg-wrap.sys  .msg-bub { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; color: rgba(255,255,255,0.35); font-size: 12px; }
.msg-bub pre { background: rgba(0,0,0,0.35); border-radius: 8px; padding: 10px; margin-top: 8px; overflow-x: auto; font-size: 12px; font-family: monospace; }
.msg-bub code { font-family: monospace; background: rgba(0,0,0,0.3); padding: 2px 5px; border-radius: 4px; color: #D4AF37; font-size: 12px; }
.msg-bub strong { color: rgba(255,255,255,0.9); }

/* Input chat fix */
.chat-input-area {
    position: fixed;
    bottom: env(safe-area-inset-bottom, 0px);
    left: 0; right: 0;
    background: #0a0a12;
    border-top: 1px solid rgba(255,255,255,0.08);
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    padding-bottom: calc(66px + env(safe-area-inset-bottom, 0px));
}
.chat-input-area textarea {
    flex: 1;
    margin-bottom: 0;
    min-height: 44px;
    max-height: 100px;
    font-size: 14px;
    border-radius: 12px;
    padding: 12px;
}
.btn-send {
    width: 44px;
    height: 44px;
    min-height: 44px;
    background: rgba(212,175,55,0.15);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 12px;
    color: #D4AF37;
    font-size: 20px;
    font-weight: 900;
    cursor: pointer;
    -webkit-appearance: none;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

/* Typing dots */
.typing { display: none; margin: 8px 0 8px 16px; }
.typing-inner { display: inline-flex; gap: 4px; align-items: center; padding: 10px 14px; background: rgba(10,132,255,0.08); border: 1px solid rgba(10,132,255,0.15); border-radius: 14px; }
.typing-inner span { width: 6px; height: 6px; border-radius: 50%; background: rgba(10,132,255,0.5); animation: td 1.2s infinite; }
.typing-inner span:nth-child(2) { animation-delay: .2s; }
.typing-inner span:nth-child(3) { animation-delay: .4s; }
@keyframes td { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }

/* Toast */
#toast {
    display: none;
    position: fixed;
    top: calc(20px + env(safe-area-inset-top, 0px));
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    padding: 12px 20px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
    pointer-events: none;
}
#toast.g { background: rgba(52,199,89,0.2); border: 1px solid rgba(52,199,89,0.4); color: #34c759; }
#toast.r { background: rgba(255,59,48,0.2); border: 1px solid rgba(255,59,48,0.4); color: #ff3b30; }
#toast.o { background: rgba(212,175,55,0.2); border: 1px solid rgba(212,175,55,0.4); color: #D4AF37; }
#toast.b { background: rgba(10,132,255,0.2); border: 1px solid rgba(10,132,255,0.4); color: #0A84FF; }

/* Status */
#status-msg { font-size: 12px; text-align: center; padding: 10px; }

/* Sandbox */
.sandbox-page { padding: 16px; padding-bottom: 80px; }
.sb-editor { min-height: 300px; font-family: monospace; font-size: 12px; }

/* Mascare chei */
.masked { letter-spacing: 3px; color: rgba(255,255,255,0.3); }
</style>
</head>
<body>

<!-- TOAST -->
<div id="toast"></div>

<!-- HEADER -->
<div class="hdr">
    <div class="hdr-title">VV NEXUS</div>
    <div style="display:flex;align-items:center;gap:8px;">
        <div class="hdr-dot" id="dot"></div>
        <div id="hdr-txt" style="font-size:11px;color:rgba(255,255,255,0.3);">offline</div>
    </div>
</div>

<!-- PAGE: SETUP -->
<div class="page active" id="page-setup">

    <div style="height:16px;"></div>

        <label>GEMINI API KEY *</label>

            <div class="rpill active" onclick="setRepo('ceo.html',this)">ceo.html</div>
            <div class="rpill" onclick="setRepo('vv-team',this)">vv-team</div>

        <button class="btn btn-gold" onclick="exportSeed()">📥 EXPORTĂ CONFIGURAȚIA</button>

</div>

<!-- PAGE: CHAT -->
<div class="page" id="page-chat" style="padding-bottom:0;">
    <div style="padding:8px 14px 0;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;">
        <button class="nav-btn" style="flex-shrink:0;min-height:32px;font-size:11px;padding:6px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:rgba(255,255,255,0.35);"
            onclick="quickSend('Ce bug-uri poate avea VV Beta?')">🔍 Bugs</button>
        <button class="nav-btn" style="flex-shrink:0;min-height:32px;font-size:11px;padding:6px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:rgba(255,255,255,0.35);"
            onclick="quickSend('Ce feature nou ar crește retenția în VV Beta?')">💡 Idee</button>
        <button class="nav-btn" style="flex-shrink:0;min-height:32px;font-size:11px;padding:6px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:rgba(255,255,255,0.35);"
            onclick="quickSend('Care sunt pașii pentru lansarea VV Beta?')">🚀 Plan</button>

    <div class="chat-box" id="chat" style="padding:12px 16px 0;overflow-y:auto;height:calc(100vh - 200px);-webkit-overflow-scrolling:touch;"></div>

    <div class="typing" id="typing">
        <div class="typing-inner"><span></span><span></span><span></span></div>
    </div>

    <div class="chat-input-area">

<!-- PAGE: SANDBOX -->

</div>

<!-- NAV -->
<div class="nav">
    <button class="nav-btn active" id="nav-setup" onclick="goPage('setup')">
        <span class="nav-icon">⚙️</span>SETUP
    </button>
    <button class="nav-btn" id="nav-chat" onclick="goPage('chat')">
        <span class="nav-icon">💬</span>CHAT

<style>
.rpill {
    padding: 8px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    touch-action: manipulation;
}
.rpill.active {
    background: rgba(212,175,55,0.12);
    border-color: rgba(212,175,55,0.3);
    color: #D4AF37;
}
</style>

<script>
// ================================================================
// VV NEXUS — Ultra Simple · iPhone X Guaranteed
// ================================================================

var G = {
    gk: '', gt: '', gu: '',
    repo: 'ceo.html',
    msgs: [],
    busy: false,
    lastCode: null,
    lastFile: null
};

var CTX = 'Ești VV NEXUS — asistentul AI personal al fondatorului VV Technologies.\n\nProiect VV: aplicație P2P urban intelligence pe GitHub Pages (vv-technologies.github.io).\nStack: HTML + CSS + Vanilla JS + Firebase (project: vv-ep-beta).\nDesign: BG #050507, Gold #D4AF37, Green #34c759, Blue #0A84FF. Glassmorphism dark.\nReguli: nu alert(), folosește showToast(). Firebase: .set merge:true. min-height:44px butoane.\nMarchează [DEPLOY:filename] la final când codul e gata.\nRăspunde MEREU în română. Cod funcțional din prima.';

// ── INIT ─────────────────────────────────────────────────────
(function() {
    G.gk   = store('get', 'nx_gk')   || '';
    G.gt   = store('get', 'nx_gt')   || '';
    G.gu   = store('get', 'nx_gu')   || '';
    G.repo = store('get', 'nx_repo') || 'ceo.html';

    if (G.gk) {
        document.getElementById('inp-gk').value = G.gk;
        document.getElementById('inp-gt').value = G.gt || '';
        document.getElementById('inp-gu').value = G.gu || '';
        syncRepo();
        setOnline(true);
        goPage('chat');
        addSys('NEXUS online · ' + G.repo + ' · Scrie comanda ta.');
    }

    syncRepo();

    var ta = document.getElementById('inp-msg');
    ta.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 100) + 'px';
    });
    ta.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
    });
})();

// ── STORAGE cu cookie fallback ────────────────────────────────
function store(action, key, val) {
    if (action === 'set') {
        try { localStorage.setItem(key, val); } catch(e) {}
        try {
            var d = new Date(); d.setFullYear(d.getFullYear() + 1);
            document.cookie = key + '=' + encodeURIComponent(val) + ';expires=' + d.toUTCString() + ';path=/';
        } catch(e) {}
    } else {
        var v = null;
        try { v = localStorage.getItem(key); } catch(e) {}
        if (v) return v;
        try {
            var ca = document.cookie.split(';');
            for (var i = 0; i < ca.length; i++) {
                var c = ca[i].trim();
                if (c.indexOf(key + '=') === 0) return decodeURIComponent(c.substring(key.length + 1));
            }
        } catch(e) {}
        return null;
    }
}

// ── NAVIGARE ─────────────────────────────────────────────────
function goPage(id) {
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('page-' + id).classList.add('active');
    document.getElementById('nav-' + id).classList.add('active');
}

// ── REPO ─────────────────────────────────────────────────────
function setRepo(name, el) {
    G.repo = name;
    store('set', 'nx_repo', name);
    document.querySelectorAll('.rpill').forEach(function(p) { p.classList.remove('active'); });
    el.classList.add('active');
}

function syncRepo() {
    document.querySelectorAll('.rpill').forEach(function(p) {
        p.classList.toggle('active', p.textContent.trim() === G.repo);
    });
}

// ── ACTIVEAZĂ ─────────────────────────────────────────────────
function doActivate() {
    var gk = document.getElementById('inp-gk').value.trim();
    var gu = document.getElementById('inp-gu').value.trim();
    var gt = document.getElementById('inp-gt').value.trim();

    if (!gk) {
        showStatus('⚠️ Cheia Gemini e obligatorie.', 'red');
        return;
    }

    G.gk = gk; G.gu = gu; G.gt = gt;
    store('set', 'nx_gk', gk);
    store('set', 'nx_gu', gu);
    store('set', 'nx_gt', gt);
    store('set', 'nx_repo', G.repo);

    setOnline(true);
    toast('✅ NEXUS activat!', 'g');

    setTimeout(function() {
        goPage('chat');
        addSys('NEXUS online · Repo: ' + G.repo + ' · Scrie comanda ta.');
    }, 600);
}

function showStatus(msg, color) {
    var el = document.getElementById('status-msg');
    el.textContent = msg;
    el.style.color = color === 'red' ? '#ff3b30' : '#34c759';
}

function setOnline(on) {
    document.getElementById('dot').className = 'hdr-dot' + (on ? ' on' : '');
    document.getElementById('hdr-txt').textContent = on ? 'online' : 'offline';
}

// ── SEND ─────────────────────────────────────────────────────
function doSend() {
    if (G.busy) return;
    var ta = document.getElementById('inp-msg');
    var txt = ta.value.trim();
    if (!txt) return;
    if (!G.gk) { toast('Configurează cheia în SETUP.', 'o'); goPage('setup'); return; }

    addMsg('user', txt);
    ta.value = ''; ta.style.height = 'auto';
    G.msgs.push({ role: 'user', parts: [{ text: txt }] });
    callAI();
}

function quickSend(txt) {
    if (!G.gk) { toast('Configurează cheia în SETUP.', 'o'); goPage('setup'); return; }
    document.getElementById('inp-msg').value = txt;
    doSend();
}

// ── GEMINI ───────────────────────────────────────────────────
async function callAI() {
    G.busy = true;
    setOnline(false);
    document.getElementById('hdr-txt').textContent = 'procesează...';
    document.getElementById('typing').style.display = 'block';
    document.getElementById('btn-send').disabled = true;

    var contents = [
        { role: 'user',  parts: [{ text: CTX + '\n\n---' }] },
        { role: 'model', parts: [{ text: 'NEXUS gata.' }] }
    ];
    G.msgs.slice(-6).forEach(function(m) { contents.push(m); });

    try {
        var r = await fetch(
            'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + G.gk,
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: contents,
                    generationConfig: { temperature: 0.7, maxOutputTokens: 4096 },
                    safetySettings: [
                        { category: 'HARM_CATEGORY_HARASSMENT',        threshold: 'BLOCK_NONE' },
                        { category: 'HARM_CATEGORY_HATE_SPEECH',       threshold: 'BLOCK_NONE' },
                        { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_NONE' },
                        { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_NONE' }
                    ]
                })
            }
        );

        if (!r.ok) {
            var e = await r.json().catch(function() { return {}; });
            var m = (e.error && e.error.message) || ('Eroare HTTP ' + r.status);
            if (r.status === 400) m = 'Cheie invalidă. Verifică în SETUP.';
            if (r.status === 429) m = 'Limită depășită. Așteaptă 1 minut.';
            if (r.status === 403) m = 'Cheie fără acces. Regenerează din AI Studio.';
            throw new Error(m);
        }

        var data = await r.json();
        var txt  = data.candidates &&
                   data.candidates[0] &&
                   data.candidates[0].content &&
                   data.candidates[0].content.parts &&
                   data.candidates[0].content.parts[0] &&
                   data.candidates[0].content.parts[0].text;

        if (!txt) throw new Error('Răspuns gol.');

        G.msgs.push({ role: 'model', parts: [{ text: txt }] });
        processReply(txt);

    } catch(err) {
        addMsg('ai', '⚠️ ' + err.message);
    } finally {
        G.busy = false;
        document.getElementById('typing').style.display = 'none';
        document.getElementById('btn-send').disabled = false;
        setOnline(true);
    }
}

// ── PROCESS ──────────────────────────────────────────────────
function processReply(text) {
    var dm = text.match(/\[DEPLOY:\s*([^\]]+)\]/);
    var fn = dm ? dm[1].trim() : null;

    var codeRx = /```(?:\w+)?\n([\s\S]*?)```/g;
    var codes = [], m;
    while ((m = codeRx.exec(text)) !== null) codes.push(m[1]);

    if (codes.length) {
        G.lastCode = codes[codes.length - 1];
        G.lastFile = fn;
        document.getElementById('sb-code').value = G.lastCode;
        document.getElementById('sb-filename').textContent = fn || 'cod generat';
    }

    addMsg('ai', text, codes.length > 0, fn);
}

// ── MESSAGES ─────────────────────────────────────────────────
function addMsg(role, text, hasCode, deployFile) {
    var chat = document.getElementById('chat');
    var wrap = document.createElement('div');

    if (role === 'sys') {
        wrap.className = 'msg-wrap sys';
        wrap.innerHTML = '<div class="msg-bub">' + esc(text) + '</div>';
        chat.appendChild(wrap); scrBot(); return;
    }

    wrap.className = 'msg-wrap ' + (role === 'user' ? 'user' : 'ai');
    var who = role === 'user' ? 'TU' : 'NEXUS';
    var bubHtml = fmt(text);

    wrap.innerHTML = '<div class="msg-who">' + who + '</div><div class="msg-bub">' + bubHtml + '</div>';

    if (hasCode) {
        var sbBtn = document.createElement('button');
        sbBtn.style.cssText = 'margin-top:6px;padding:8px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:9px;color:rgba(255,255,255,0.5);font-size:12px;cursor:pointer;display:block;touch-action:manipulation;';
        sbBtn.textContent = '🛠 DESCHIDE ÎN SANDBOX';
        sbBtn.onclick = function() { goPage('sandbox'); };
        wrap.appendChild(sbBtn);
    }

    chat.appendChild(wrap);
    scrBot();
}

function addSys(text) { addMsg('sys', text); }

function fmt(t) {
    var h = esc(t);
    h = h.replace(/```(?:\w+)?\n([\s\S]*?)```/g, function(_, c) { return '<pre>' + c + '</pre>'; });
    h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
    h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    h = h.replace(/\n/g, '<br>');
    return h;
}

function esc(t) {
    return (t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scrBot() {
    var c = document.getElementById('chat');
    setTimeout(function() { c.scrollTop = c.scrollHeight; }, 50);
}

// ── SANDBOX ──────────────────────────────────────────────────
function sbPush() {
    var code = document.getElementById('sb-code').value.trim();
    if (!code) { toast('Sandbox gol.', 'r'); return; }
    if (!G.gt || !G.gu) { toast('Configurează GitHub Token în SETUP.', 'o'); goPage('setup'); return; }
    var fn = document.getElementById('sb-filename').textContent;
    if (!fn || fn === '—' || fn === 'cod generat') {
        fn = prompt('Numele fișierului (ex: vv-beta-app.js):');
    }
    if (!fn) return;
    G.lastCode = code; G.lastFile = fn;

    var url = 'https://api.github.com/repos/' + G.gu + '/' + G.repo + '/contents/' + fn;
    fetch(url, { headers: { 'Authorization': 'Bearer ' + G.gt, 'Accept': 'application/vnd.github+json' } })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(fd) {
            var body = { message: 'VV NEXUS · ' + fn, content: btoa(unescape(encodeURIComponent(code))) };
            if (fd && fd.sha) body.sha = fd.sha;
            return fetch(url, { method: 'PUT', headers: { 'Authorization': 'Bearer ' + G.gt, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        })
        .then(function(r) { if (r && r.ok) toast('🚀 ' + fn + ' deploiat!', 'g'); else toast('Eroare la push.', 'r'); })
        .catch(function(e) { toast('Eroare: ' + e.message, 'r'); });
}

function sbCopy() {
    var code = document.getElementById('sb-code').value;
    if (!code) { toast('Sandbox gol.', 'r'); return; }
    if (navigator.clipboard) {
        navigator.clipboard.writeText(code).then(function() { toast('Copiat!', 'g'); });
    } else {
        document.getElementById('sb-code').select();
        document.execCommand('copy');
        toast('Copiat!', 'g');
    }
}

function sbClear() {
    document.getElementById('sb-code').value = '';
    document.getElementById('sb-filename').textContent = '—';
    G.lastCode = null; G.lastFile = null;
    toast('Sandbox curățat.', 'b');
}

// ── TOAST ────────────────────────────────────────────────────
function toast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = type || 'g';
    t.style.display = 'block';
    setTimeout(function() { t.style.display = 'none'; }, 3000);
}

// ── SĂMÂNȚA VV — Export/Import configurație ──────────────────
function exportSeed() {
    if (!G.gk) { toast('Activează NEXUS mai întâi.', 'o'); return; }

    // Criptăm simplu cu XOR
    var salt = 'VVSeed2025';
    function xorStr(s) {
        var r = '';
        for (var i = 0; i < s.length; i++) {
            r += String.fromCharCode(s.charCodeAt(i) ^ salt.charCodeAt(i % salt.length));
        }
        return btoa(unescape(encodeURIComponent(r)));
    }

    var seed = {
        v: '1',
        k: xorStr(G.gk),
        t: xorStr(G.gt || ''),
        u: G.gu || '',
        r: G.repo || 'ceo.html'
    };

    var content = JSON.stringify(seed);
    var blob = new Blob([content], { type: 'text/plain' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'nexus.vvseed';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('✅ Sămânța salvată! Pune-o în Files.', 'g');
}

function importSeed(input) {
    var file = input.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        try {
            var salt = 'VVSeed2025';
            function xorDec(enc) {
                var decoded = decodeURIComponent(escape(atob(enc)));
                var r = '';
                for (var i = 0; i < decoded.length; i++) {
                    r += String.fromCharCode(decoded.charCodeAt(i) ^ salt.charCodeAt(i % salt.length));
                }
                return r;
            }

            var seed = JSON.parse(e.target.result);
            var gk = xorDec(seed.k);
            var gt = xorDec(seed.t || '');
            var gu = seed.u || '';
            var repo = seed.r || 'ceo.html';

            if (!gk) { toast('Sămânță invalidă.', 'r'); return; }

            // Salvăm
            G.gk = gk; G.gt = gt; G.gu = gu; G.repo = repo;
            store('set', 'nx_gk', gk);
            store('set', 'nx_gt', gt);
            store('set', 'nx_gu', gu);
            store('set', 'nx_repo', repo);

            // Update UI
            document.getElementById('inp-gk').value = gk;
            document.getElementById('inp-gt').value = gt;
            document.getElementById('inp-gu').value = gu;
            syncRepo();
            setOnline(true);

            toast('✅ Sămânța importată! NEXUS activ.', 'g');
            setTimeout(function() {
                goPage('chat');
                addSys('NEXUS restaurat din Sămânță · Repo: ' + repo);
            }, 800);

        } catch(err) {
            toast('Eroare la import: ' + err.message, 'r');
        }
    };
    reader.readAsText(file);
    input.value = '';
}

</script>
