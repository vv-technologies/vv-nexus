<meta charset="UTF-8">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#D4AF37;--gold2:rgba(212,175,55,.1);--gold-b:rgba(212,175,55,.2);
  --w:#fff;--w70:rgba(255,255,255,.7);--w50:rgba(255,255,255,.5);
  --w30:rgba(255,255,255,.3);--w15:rgba(255,255,255,.15);
  --w08:rgba(255,255,255,.08);--w04:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.07);
  --green:#34c759;--blue:#0A84FF;--orange:#FF9500;--red:#ff3b30;
  --font:'Syne',sans-serif;--body:'DM Sans',sans-serif;
}
html,body{min-height:100vh;background:#000;color:var(--w);
  font-family:var(--body);-webkit-font-smoothing:antialiased;overflow-x:hidden;}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;
  padding:14px 28px;display:flex;align-items:center;justify-content:space-between;
  transition:background .3s;}
.hdr.solid{background:rgba(0,0,0,.92);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);}
.logo{font-family:var(--font);font-weight:900;font-size:16px;
  letter-spacing:6px;color:var(--gold);text-decoration:none;
  display:flex;align-items:center;gap:7px;}
.logo-sub{font-size:9px;letter-spacing:2px;color:var(--w30);
  font-family:var(--body);font-weight:400;
  border-left:1px solid var(--border);padding-left:8px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-link{padding:5px 12px;background:var(--w04);border:0.5px solid var(--border);
  border-radius:100px;font-size:11px;color:var(--w30);text-decoration:none;transition:all .15s;}
.hdr-link:hover{color:var(--w70);background:var(--w08);}
.back-btn{display:none;align-items:center;gap:5px;padding:5px 12px;
  background:var(--w04);border:0.5px solid var(--border);border-radius:100px;
  font-size:11px;color:var(--w30);cursor:pointer;transition:all .15s;font-family:var(--body);}
.back-btn:hover{color:var(--w70);}
.back-btn.show{display:flex;}

/* ── OFFLINE BANNER ── */
.offline-banner{
  display:none;position:fixed;top:0;left:0;right:0;z-index:300;
  background:rgba(255,149,0,.12);border-bottom:0.5px solid rgba(255,149,0,.3);
  padding:8px 20px;font-size:11px;color:var(--orange);
  text-align:center;
}
.offline-banner.show{display:block;}

/* ── HERO ── */
.hero{min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:80px 24px 60px;transition:all .5s cubic-bezier(.16,1,.3,1);}
.hero.compact{min-height:auto;padding:78px 24px 16px;justify-content:flex-start;}
.hex{width:42px;height:42px;border-radius:50%;
  border:1px solid rgba(212,175,55,.2);background:rgba(212,175,55,.04);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;margin-bottom:22px;}
.hero.compact .hex{display:none;}
.hero-title{font-family:var(--font);font-size:clamp(20px,2.8vw,38px);
  font-weight:900;letter-spacing:-1px;text-align:center;
  line-height:1.08;margin-bottom:8px;}
.hero.compact .hero-title{display:none;}
.hero-title .g{color:var(--gold);}
.hero-sub{font-size:14px;color:var(--w30);text-align:center;
  margin-bottom:28px;font-weight:300;max-width:380px;}
.hero.compact .hero-sub{display:none;}

/* ── SEARCH ── */
.search-wrap{width:100%;max-width:580px;position:relative;}
.search-input{width:100%;background:rgba(255,255,255,.06);
  border:1px solid rgba(212,175,55,.22);border-radius:100px;
  padding:16px 58px 16px 24px;color:var(--w);
  font-family:var(--body);font-size:15px;outline:none;
  transition:all .25s;-webkit-appearance:none;}
.search-input::placeholder{color:var(--w30);}
.search-input:focus{border-color:rgba(212,175,55,.45);background:rgba(255,255,255,.08);}
.search-go{position:absolute;right:6px;top:50%;transform:translateY(-50%);
  width:42px;height:42px;background:var(--gold);color:#000;
  border:none;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;transition:opacity .15s;}
.search-go:active{opacity:.8;}

/* ── LAYERS ── */
.layers{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;
  justify-content:center;max-width:580px;}
.hero.compact .layers{justify-content:flex-start;}
.layer{display:flex;align-items:center;gap:5px;padding:6px 13px;
  background:var(--w04);border:0.5px solid var(--border);
  border-radius:100px;font-size:11px;color:var(--w30);
  cursor:pointer;transition:all .2s;font-weight:500;}
.layer-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.l-access .layer-dot{background:rgba(10,132,255,.8);}
.l-access.active{border-color:rgba(10,132,255,.4);background:rgba(10,132,255,.08);color:rgba(10,132,255,.9);}
.l-urgent .layer-dot{background:rgba(255,149,0,.8);}
.l-urgent.active{border-color:rgba(255,149,0,.4);background:rgba(255,149,0,.08);color:rgba(255,149,0,.9);}
.l-biz .layer-dot{background:rgba(212,175,55,.8);}
.l-biz.active{border-color:rgba(212,175,55,.4);background:rgba(212,175,55,.08);color:rgba(212,175,55,.9);}
.l-safe .layer-dot{background:rgba(52,199,89,.8);}
.l-safe.active{border-color:rgba(52,199,89,.4);background:rgba(52,199,89,.08);color:rgba(52,199,89,.9);}

/* Sugestii */
.suggestions{display:flex;gap:8px;flex-wrap:wrap;
  justify-content:center;margin-top:14px;max-width:580px;}
.hero.compact .suggestions{display:none;}
.sug{padding:6px 14px;background:var(--w04);border:0.5px solid var(--border);
  border-radius:100px;font-size:12px;color:var(--w30);cursor:pointer;transition:all .15s;}
.sug:hover{background:var(--gold2);border-color:var(--gold-b);color:var(--gold);}

/* Istoric */
.history{margin-top:22px;width:100%;max-width:500px;}
.hero.compact .history{display:none;}
.hist-label{font-size:9px;color:var(--w15);letter-spacing:2px;text-align:center;margin-bottom:8px;}
.hist-list{display:flex;flex-direction:column;gap:3px;}
.hist-item{display:flex;align-items:center;gap:10px;padding:9px 14px;
  background:var(--w04);border:0.5px solid var(--border);
  border-radius:10px;cursor:pointer;transition:all .15s;}
.hist-item:hover{background:var(--w08);}
.hist-q{flex:1;font-size:12px;color:var(--w30);}
.hist-layer{font-size:9px;padding:2px 7px;border-radius:100px;
  background:var(--w04);color:var(--w30);}
.hist-t{font-size:10px;color:var(--w15);}

/* ── RESULTS ── */
.results{width:100%;max-width:620px;margin:0 auto;padding:0 24px 80px;display:none;}
.results.show{display:block;}

/* Loading */
.load-line{position:fixed;top:0;left:0;right:0;height:2px;z-index:999;display:none;}
.load-line.on{display:block;}
.load-fill{height:100%;
  background:linear-gradient(90deg,transparent,var(--gold),rgba(212,175,55,.5),var(--gold),transparent);
  animation:ldAnim 1.6s ease-in-out infinite;}
@keyframes ldAnim{0%{width:0;margin-left:0}50%{width:70%;margin-left:15%}100%{width:0;margin-left:100%}}

/* Cards */
.answer-card{background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.1);
  border-radius:18px;padding:20px 22px;margin-bottom:10px;
  animation:fadeUp .35s cubic-bezier(.16,1,.3,1) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.answer-card:nth-child(1){animation-delay:.0s}
.answer-card:nth-child(2){animation-delay:.06s}
.answer-card:nth-child(3){animation-delay:.12s}
.answer-card:nth-child(4){animation-delay:.18s}

.card-src{display:flex;align-items:center;gap:6px;
  font-size:9px;color:var(--w30);letter-spacing:1.5px;margin-bottom:10px;}
.src-dot{width:5px;height:5px;border-radius:50%;}
.dot-gold{background:var(--gold);}
.dot-green{background:var(--green);}
.dot-web{background:rgba(255,255,255,.3);}
.dot-blue{background:var(--blue);}

.answer-text{font-size:15px;color:var(--w70);line-height:1.75;}
.answer-text strong{color:var(--w);font-weight:500;}

/* Layer badge */
.layer-badge{display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:100px;font-size:9px;font-weight:700;
  letter-spacing:1px;margin-bottom:8px;}
.lb-access{background:rgba(10,132,255,.08);border:0.5px solid rgba(10,132,255,.2);color:rgba(10,132,255,.9);}
.lb-urgent{background:rgba(255,149,0,.08);border:0.5px solid rgba(255,149,0,.2);color:rgba(255,149,0,.9);}
.lb-biz{background:rgba(212,175,55,.08);border:0.5px solid rgba(212,175,55,.2);color:rgba(212,175,55,.9);}
.lb-safe{background:rgba(52,199,89,.08);border:0.5px solid rgba(52,199,89,.2);color:rgba(52,199,89,.9);}

/* Web data card — discret */
.web-card{background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.07);
  border-radius:18px;padding:18px 22px;margin-bottom:10px;
  animation:fadeUp .35s cubic-bezier(.16,1,.3,1) .1s both;}
.web-label{display:inline-flex;align-items:center;gap:5px;
  padding:2px 9px;border-radius:100px;font-size:9px;font-weight:600;
  background:rgba(255,255,255,.05);border:0.5px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.4);margin-bottom:10px;letter-spacing:1px;}
.web-text{font-size:13px;color:var(--w50);line-height:1.7;}
.web-note{font-size:11px;color:var(--w30);margin-top:8px;font-style:italic;}

/* VV Data card */
.vv-card{background:rgba(212,175,55,.04);border:0.5px solid rgba(212,175,55,.15);
  border-radius:18px;padding:20px 22px;margin-bottom:10px;
  animation:fadeUp .35s cubic-bezier(.16,1,.3,1) .06s both;}
.data-badge{display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:100px;font-size:10px;font-weight:500;margin-bottom:10px;}
.db-fresh{background:rgba(52,199,89,.08);border:0.5px solid rgba(52,199,89,.2);color:var(--green);}
.db-old{background:rgba(255,149,0,.08);border:0.5px solid rgba(255,149,0,.2);color:var(--orange);}
.proof-item{padding:9px 0;border-bottom:0.5px solid rgba(255,255,255,.05);
  font-size:13px;color:var(--w70);line-height:1.6;}
.proof-item:last-child{border-bottom:none;}
.proof-meta{font-size:11px;color:var(--w30);margin-top:2px;}

/* VERIFY — podul spre VV Pulse */
.verify-wrap{margin-top:14px;padding-top:14px;border-top:0.5px solid var(--border);}
.verify-label{font-size:9px;color:rgba(212,175,55,.5);letter-spacing:2px;
  font-weight:700;margin-bottom:8px;}
.verify-btn{display:flex;align-items:center;gap:10px;width:100%;
  padding:13px 18px;background:rgba(212,175,55,.08);
  border:0.5px solid rgba(212,175,55,.25);border-radius:12px;
  cursor:pointer;transition:all .2s;font-family:var(--body);}
.verify-btn:hover{background:rgba(212,175,55,.14);}
.verify-btn.done{opacity:.5;pointer-events:none;}
.vb-icon{font-size:15px;flex-shrink:0;}
.vb-body{flex:1;text-align:left;}
.vb-title{font-size:13px;font-weight:500;color:var(--gold);display:block;}
.vb-sub{font-size:11px;color:var(--w30);display:block;margin-top:1px;}
.flash-status{display:none;align-items:center;gap:8px;margin-top:8px;
  padding:10px 14px;background:rgba(52,199,89,.05);
  border:0.5px solid rgba(52,199,89,.18);border-radius:10px;
  font-size:12px;color:var(--green);}
.flash-status.on{display:flex;}
.fp{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;
  animation:fp 1.2s ease-in-out infinite;}
@keyframes fp{0%,100%{opacity:1}50%{opacity:.2}}

/* Share WhatsApp */
.share-row{display:flex;align-items:center;gap:8px;margin-top:10px;}
.share-btn{display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;background:rgba(37,211,102,.08);
  border:0.5px solid rgba(37,211,102,.2);border-radius:100px;
  font-size:11px;color:rgba(37,211,102,.8);cursor:pointer;
  transition:all .15s;font-family:var(--body);}
.share-btn:hover{background:rgba(37,211,102,.14);}
.copy-btn{display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;background:var(--w04);border:0.5px solid var(--border);
  border-radius:100px;font-size:11px;color:var(--w30);cursor:pointer;
  transition:all .15s;font-family:var(--body);}
.copy-btn:hover{background:var(--w08);color:var(--w70);}

/* Pills */
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.pill{padding:5px 12px;background:var(--w04);border:0.5px solid var(--border);
  border-radius:100px;font-size:11px;color:var(--w30);cursor:pointer;transition:all .15s;}
.pill:hover{background:var(--gold2);border-color:var(--gold-b);color:var(--gold);}

/* Offline cached */
.offline-card{background:rgba(255,149,0,.04);border:0.5px solid rgba(255,149,0,.15);
  border-radius:18px;padding:18px 22px;margin-bottom:10px;}

/* Blocked */
.blocked-card{background:rgba(255,59,48,.03);border:0.5px solid rgba(255,59,48,.1);
  border-radius:18px;padding:20px 22px;
  animation:fadeUp .35s cubic-bezier(.16,1,.3,1);}

/* Premium note */
.premium-note{padding:10px 16px;background:var(--w04);border:0.5px solid var(--border);
  border-radius:12px;display:flex;align-items:center;justify-content:space-between;
  gap:10px;font-size:11px;color:var(--w30);margin-top:8px;}
.premium-note b{color:var(--gold);font-size:11px;white-space:nowrap;}

/* Pulse Feed */
.pulse-feed{position:fixed;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.88);backdrop-filter:blur(12px);
  border-top:0.5px solid rgba(255,255,255,.05);
  padding:6px 24px;display:flex;align-items:center;justify-content:space-between;
  z-index:50;font-size:11px;color:rgba(255,255,255,.25);}
.pf-left{display:flex;align-items:center;gap:8px;}
.pf-dot{width:5px;height:5px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px rgba(52,199,89,.8);animation:fp 2s ease-in-out infinite;}

/* Toast */
#toast{position:fixed;bottom:40px;left:50%;
  transform:translateX(-50%) translateY(6px);
  background:rgba(8,8,14,.97);border:0.5px solid var(--w08);
  border-radius:100px;padding:9px 20px;font-size:11px;color:var(--w70);
  opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* Responsive */
@media(max-width:600px){
  .hdr{padding:10px 16px;}
  .hdr-right .hdr-link{display:none;}
  .search-input{font-size:14px;padding:14px 52px 14px 18px;}
}
</style>
</head>

  return new Promise(function(res){
    if(!_idb){res(null);return;}
    try{
      var r=_idb.transaction(store,'readonly').objectStore(store).get(k);
      r.onsuccess=function(){
        var d=r.result;
        if(!d||Date.now()-d.ts>TTL){res(null);return;}
        res(d.v);
      };
      r.onerror=function(){res(null);};
    }catch(e){res(null);}
  });
}
function idbSet(store,k,v){
  if(!_idb)return;
  try{_idb.transaction(store,'readwrite').objectStore(store).put({k,v,ts:Date.now()});}catch(e){}
}
function purge(){
  if(!_idb)return;
  ['loc','cache'].forEach(function(store){
    try{
      var tx=_idb.transaction(store,'readwrite');
      tx.objectStore(store).openCursor().onsuccess=function(e){
        var cur=e.target.result;
        if(!cur)return;
        if(Date.now()-cur.value.ts>TTL)cur.delete();
        cur.continue();
      };
    }catch(e){}
  });
}

function detectLayer(q){

  var l=q.toLowerCase();

// ── VV LEA · CITY INTELLIGENCE ────────────────────────────────
var _homeCity = localStorage.getItem('vvme_home_city') || null;
var _currentCity = localStorage.getItem('vvme_current_city') || null;
var _cityLat = null;
var _cityLng = null;

async function detectCityFromGPS(lat, lng) {
  try {
    var url = 'https://nominatim.openstreetmap.org/reverse?format=json&lat='+lat+'&lon='+lng+'&accept-language=ro';
    var r = await fetch(url);
    var d = await r.json();
    var city = d.address ? (d.address.city || d.address.town || d.address.village || d.address.county || 'România') : 'România';
    return city;
  } catch(e) { return null; }
}

async function initCityContext() {
  if (!_gps) return;
  
  var detectedCity = await detectCityFromGPS(_gps.lat, _gps.lng);
  if (!detectedCity) return;
  
  _currentCity = detectedCity;
  
  // Prima vizita — seteaza orasul de acasa
  if (!_homeCity) {
    _homeCity = detectedCity;
    localStorage.setItem('vvme_home_city', _homeCity);
  }
  
  localStorage.setItem('vvme_current_city', _currentCity);
  
  // Update placeholder cu orasul detectat
  var inp = document.getElementById('search-input');
  if (inp && detectedCity) {
    inp.placeholder = 'Ce vrei să știi despre ' + detectedCity + '?';
  }
  
  // Daca e alt oras decat acasa — context switch silent
  if (_homeCity && _currentCity && _homeCity.toLowerCase() !== _currentCity.toLowerCase()) {
    showCitySwitch(_currentCity);
  }
}

function showCitySwitch(city) {
  // Notificare discreta ca VV Lea a schimbat contextul
  var banner = document.createElement('div');
  banner.style.cssText = 'position:fixed;top:58px;left:50%;transform:translateX(-50%);background:rgba(10,132,255,.12);border:0.5px solid rgba(10,132,255,.25);border-radius:100px;padding:6px 16px;font-size:11px;color:rgba(10,132,255,.9);z-index:100;animation:fadeUp .3s ease;pointer-events:none;';
  banner.textContent = '📍 VV Lea: context schimbat → ' + city;
  document.body.appendChild(banner);
  setTimeout(function(){ banner.remove(); }, 3000);
}

// Purjare inteligenta la schimb de oras
function purgeIfCityChanged() {
  var lastCity = localStorage.getItem('vvme_last_search_city');
  if (lastCity && _currentCity && lastCity.toLowerCase() !== _currentCity.toLowerCase()) {
    // Oras diferit — purjeaza cache-ul de cautari (nu si locatiile statice)
    localStorage.removeItem('vvnow_h');
    if (_idb) {
      try {
        var tx = _idb.transaction('cache','readwrite');
        tx.objectStore('cache').clear();
      } catch(e) {}
    }
  }
  if (_currentCity) localStorage.setItem('vvme_last_search_city', _currentCity);
}

// Injecteaza orasul in cautare daca userul nu l-a specificat
function enrichQueryWithCity(q) {
  var city = _currentCity || _homeCity;
  if (!city) return q;
  var l = q.toLowerCase();
  // Daca query-ul nu contine deja un oras, adauga contextul
  var cityWords = city.toLowerCase().split(' ');
  var hasCity = cityWords.some(function(w){ return l.includes(w) && w.length > 3; });
  if (!hasCity && city !== 'România') {
    return q; // returnam query original, dar folosim city in Nominatim
  }
  return q;
}

// ── NOMINATIM cu cache ─────────────────────────────────────────
async function findLoc(q){
  var term=getTerm(q);
  if(!term)return null;
  var ck='loc_'+term.toLowerCase().replace(/\s+/g,'_');
  var cached=await idbGet('loc',ck);
  if(cached)return cached;
  if(!_isOnline)return null;
  try{
    // Adauga orasul curent ca context daca nu e deja in query
  var searchTerm = term;
  if(_currentCity && !term.toLowerCase().includes(_currentCity.toLowerCase().split(' ')[0])) {
    searchTerm = term + ' ' + _currentCity;
  }
  var url='https://nominatim.openstreetmap.org/search?format=json&q='+
      encodeURIComponent(searchTerm)+'&limit=1&accept-language=ro&countrycodes=ro';
    if(_gps)url+='&viewbox='+(_gps.lng-.15)+','+(_gps.lat+.15)+','+(_gps.lng+.15)+','+(_gps.lat-.15)+'&bounded=0';
    var r=await fetch(url);
    var d=await r.json();
    if(d&&d[0]){idbSet('loc',ck,d[0]);return d[0];}
  }catch(e){}
  return null;
}

function getTerm(q){
  var map={
    'kaufland':'Kaufland','lidl':'Lidl','penny':'Penny Market','profi':'Profi',
    'mega':'Mega Image','auchan':'Auchan','carrefour':'Carrefour',
    'parcare':'parcare','fotbal':'teren fotbal','cafenea':'cafenea',
    'restaurant':'restaurant','pizza':'pizza','parc':'parc','mall':'mall',
    'spital':'spital','farmacie':'farmacie','atm':'ATM bancomat',
    'lift':'lift statie metrou','centrul vechi':'Centrul Vechi Bucuresti',
    'floreasca':'Floreasca Bucuresti','victoriei':'Piata Victoriei',
    'unirii':'Piata Unirii','herastrau':'Herastrau','obor':'Piata Obor',
    'tineretului':'Parcul Tineretului','kiseleff':'Kiseleff','militari':'Militari'
  };
  var l=q.toLowerCase();
  for(var k in map){if(l.includes(k))return map[k];}
  return q.split(' ').slice(0,4).join(' ');
}

// ── FIREBASE MISSIONS (date VV — 40%) ────────────────────────
async function findMissions(q,layer){
  if(!_isOnline)return[];
  try{
    var ago30=new Date(Date.now()-30*24*60*60*1000);
    var snap=await db.collection('missions')
      .where('status','==','approved')
      .where('createdAt','>=',firebase.firestore.Timestamp.fromDate(ago30))
      .orderBy('createdAt','desc').limit(5).get();
    var term=getTerm(q).toLowerCase().split(' ')[0];
    var layerTags=layer?LAYERS[layer].tags:[];
    var results=[];
    snap.forEach(function(doc){
      var d=doc.data();
      var text=((d.location||'')+(d.description||'')).toLowerCase();
      if((term.length>2&&text.includes(term))||layerTags.some(function(t){return text.includes(t);})){
        results.push(d);
      }
    });
    return results.slice(0,3);
  }catch(e){return[];}
}

// ── VV LEA · WEB SEARCH (60% hibrid) ────────────────────────────
async function nexusWebSearch(q,layer){
  if(!_isOnline)return null;

  // Verifica cache
  var ck='web_'+q.toLowerCase().replace(/\s+/g,'_').substring(0,50);
  var cached=await idbGet('cache',ck);
  if(cached)return cached;

  try{
    var system='Ești Nexus, motorul de căutare al VV Hybrid Univers pentru realitate urbană din România. '+
      'Răspunzi SCURT și UMAN (max 2-3 propoziții) la întrebări despre locații fizice, cozi, program, accesibilitate, trafic, siguranță urbană. '+
      'Limbaj: român, direct, fără jargon tehnic. '+
      'IMPORTANT: Menționezi mereu că datele publice pot fi depășite și că VERIFY din VV dă certitudine 100%.'+
      (layer?' Context: '+LAYERS[layer].label+'.':'');

    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:200,
        system:system,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:q}]
      })
    });
    if(!r.ok)return null;
    var data=await r.json();
    var text='';
    if(data.content){
      data.content.forEach(function(block){
        if(block.type==='text'&&block.text)text+=block.text;
      });
    }
    var result=text.trim()||null;
    if(result)idbSet('cache',ck,result);
    return result;
  }catch(e){return null;}
}


// ── DATE STATICE + PAGINI VV NOW ─────────────────────────────
async function findStaticData(q) {
  if(!_isOnline) return null;
  try {
    var l = q.toLowerCase();
    var snap = await db.collection('vv_static_data')
      .where('visible','==',true).get();
    var results = [];
    snap.forEach(function(doc) {
      var d = doc.data();
      var kw = (d.keywords||'').toLowerCase();
      var name = (d.name||'').toLowerCase();
      var type = (d.type||'').toLowerCase();
      var info = (d.info||'').toLowerCase();
      var qWords = l.split(/[\s,;.!?]+/).filter(function(w){ return w.length > 2; });
      
      var match = false;
      // Match pe keywords
      if(kw.split(',').some(function(k){ return k.trim().length>1 && (l.includes(k.trim()) || qWords.some(function(w){ return k.trim().includes(w); })); })) match = true;
      // Match pe nume
      if(name.split(' ').some(function(w){ return w.length>2 && l.includes(w); })) match = true;
      // Match pe tip
      if(l.includes(type) || qWords.some(function(w){ return type.includes(w) && w.length>3; })) match = true;
      // Match pe info
      if(qWords.some(function(w){ return w.length>3 && info.includes(w); })) match = true;
      
      if(match) results.push(d);
    });
    return results.slice(0, 2);
  } catch(e) { return null; }
}

async function findVVNowPage(q) {
  if(!_isOnline) return null;
  try {
    var l = q.toLowerCase();
    var qWords = l.split(/[\s,;.!?]+/).filter(function(w){ return w.length > 2; });
    var snap = await db.collection('vv_now_pages')
      .where('visible','==',true).get();
    var bestMatch = null;
    var bestScore = 0;
    snap.forEach(function(doc) {
      var d = doc.data();
      var kw = (d.keywords||'').toLowerCase().split(',').map(function(k){ return k.trim(); });
      var title = (d.title||'').toLowerCase();
      var city = (d.city||'').toLowerCase();
      var score = 0;
      
      // Score bazat pe matching
      kw.forEach(function(k) {
        if(k.length < 2) return;
        if(l.includes(k)) score += 3; // match exact in query
        qWords.forEach(function(w){ if(k.includes(w)||w.includes(k)) score += 1; });
      });
      // Bonus daca titlul contine cuvinte din query
      qWords.forEach(function(w){ if(title.includes(w)) score += 2; });
      // Bonus oras
      var userCity = (localStorage.getItem('vvme_current_city')||'').toLowerCase();
      if(city && userCity && (city.includes(userCity)||userCity.includes(city))) score += 2;
      
      if(score > bestScore) { bestScore = score; bestMatch = d; }
    });
    return bestScore >= 2 ? bestMatch : null;
  } catch(e) { return null; }
}

async function doSearch(q){
  q=(q||'').trim();
  if(!q)return;

  var layer=detectLayer(q);
  addHist(q,layer);
  purgeIfCityChanged();

  document.getElementById('hero').classList.add('compact');
  document.getElementById('hdr').classList.add('solid');
  document.getElementById('search-input').value=q;
  document.getElementById('back-btn').classList.add('show');
  window.scrollTo({top:0,behavior:'smooth'});

  var res=document.getElementById('results');
  res.innerHTML='<div style="padding:20px 0;font-size:12px;color:rgba(212,175,55,.4);text-align:center;letter-spacing:1px">VV Lea scanează...</div>';
  res.classList.add('show');
  document.getElementById('load').classList.add('on');

  // Charter
  // Verificare Charter — cuvinte intregi, nu substring (ex: 'ura' nu blocheaza 'restaurant')
  var qWords = q.toLowerCase().split(/[\s,;.!?]+/);
  var isBlocked = BLOCKED.some(function(k){
    if(k.includes(' ')) return q.toLowerCase().includes(k); // fraze intregi
    return qWords.some(function(w){ return w === k; }); // cuvinte exacte
  });
  if(isBlocked){
    document.getElementById('load').classList.remove('on');
    res.innerHTML='<div class="blocked-card"><div class="card-src"><div class="src-dot" style="background:var(--red)"></div>BLOCAT · VV CHARTER</div><div style="font-size:14px;color:rgba(255,59,48,.5);line-height:1.7">Această cerere nu poate fi procesată. VV NOW funcționează pentru realitatea urbană legală.</div></div>';
    return;
  }

  // Non-urban
  var isNonUrban = NON_URBAN.some(function(k){
    return qWords.some(function(w){ return w === k; });
  });
  if(isNonUrban){
    document.getElementById('load').classList.remove('on');
    res.innerHTML='<div class="answer-card"><div class="card-src"><div class="src-dot dot-gold"></div>VV LEA</div><div class="answer-text">VV NOW e construit pentru realitatea fizică din jurul tău — locații, cozi, accesibilitate, trafic. Pentru "<strong>'+q+'</strong>" încearcă un motor general.</div></div>';
    return;
  }

  // Offline — raspunde din cache
  if(!_isOnline){
    document.getElementById('load').classList.remove('on');
    renderOffline(q,layer);
    return;
  }

  // Cauta in paralel: date VV + locatie + web search
  var [missions,loc,webAnswer,staticData,vvPage]=await Promise.all([
    findMissions(q,layer),
    findLoc(q),
    nexusWebSearch(q,layer),
    findStaticData(q),
    findVVNowPage(q)
  ]);

  document.getElementById('load').classList.remove('on');
  renderResults(q,loc,missions,webAnswer,layer,staticData,vvPage);

  // Log
  db.collection('vvhi_dataset').add({
    action:'VV_NOW_SEARCH',
    context:{query:q.substring(0,80),layer:layer||null,hasMissions:missions.length>0,hasWeb:!!webAnswer,hour:new Date().getHours()},
    timestamp:firebase.firestore.FieldValue.serverTimestamp()
  }).catch(function(){});
}

        return '<div class="proof-item">'+(m.description||'Verificare completată')+
          '<div class="proof-meta">Insider VV · '+dateStr+'</div></div>';
      }).join('')+
    '</div>';
  }

  // ── 2.5 DATE STATICE CEO (prioritate maxima) ──
  if(staticData && staticData.length > 0) {
    staticData.forEach(function(s) {
      var typeIcons = {spital:'🏥',politie:'🚔',pompieri:'🚒',smurd:'🚑',farmacie:'💊',metrou:'🚇',primarie:'🏛️',urgenta_num:'📞',obiectiv:'🏛️'};
      html += '<div class="vv-card" style="border-color:rgba(52,199,89,.2);animation-delay:.04s">' +
        '<div class="card-src"><div class="src-dot dot-green"></div>DATE VERIFICATE · VV STATIC</div>' +
        '<div style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:100px;font-size:9px;font-weight:700;background:rgba(52,199,89,.08);border:0.5px solid rgba(52,199,89,.2);color:var(--green);margin-bottom:10px">✓ Verificat de CEO · Nu poate fi falsificat</div>' +
        '<div style="font-family:var(--font);font-size:16px;font-weight:800;margin-bottom:4px">'+(typeIcons[s.type]||'⬡')+' '+s.name+'</div>' +
        (s.addr ? '<div style="font-size:12px;color:var(--w30);margin-bottom:8px">'+s.addr+'</div>' : '') +
        '<div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--w50)">' +
        (s.phone ? '<span>📞 '+s.phone+'</span>' : '') +
        (s.hours ? '<span>🕐 '+s.hours+'</span>' : '') +
        '</div>' +
        (s.info ? '<div style="font-size:12px;color:var(--w50);margin-top:8px;line-height:1.6">'+s.info+'</div>' : '') +
      '</div>';
    });
  }

  // ── 2.6 PAGINA VV NOW (continut CEO) ──
  if(vvPage) {
    html += '<div class="answer-card" style="border-color:rgba(212,175,55,.15);animation-delay:.07s">' +
      '<div class="card-src"><div class="src-dot dot-gold"></div>PAGINA VV NOW' + (vvPage.isSponsored?' · CONȚINUT SPONSORIZAT':'') + '</div>' +
      '<div style="font-family:var(--font);font-size:15px;font-weight:800;margin-bottom:8px">'+vvPage.title+'</div>' +
      '<div class="answer-text">'+vvPage.content+'</div>' +
    '</div>';
  }

  // ── 3. DATE WEB HIBRID (60%) ──
  if(webAnswer){
    html+='<div class="web-card">'+
      '<div class="card-src"><div class="src-dot dot-web"></div>DATE PUBLICE · VV LEA WEB</div>'+
      '<div class="web-label">⚠ Nevalidat fizic · Date publice internet</div>'+
      '<div class="web-text">'+webAnswer+'</div>'+
      '<div class="web-note">Sursă: internet public. Poate fi depășit. Apasă VERIFY pentru certitudine 100%.</div>'+
    '</div>';
  } else {
    // Fallback inteligent — VV Lea încearcă oricum
    var fallbackMsg = getFallbackAnswer(q, layer);
    html+='<div class="web-card" style="border-color:rgba(255,255,255,.06)">'+
      '<div class="card-src"><div class="src-dot dot-web"></div>VV LEA · RĂSPUNS GENERAL</div>'+
      '<div class="web-label">⚠ Nevalidat fizic · Informație generală</div>'+
      '<div class="web-text">'+fallbackMsg+'</div>'+
      '<div class="web-note">VV Lea nu are date verificate din teren pentru asta încă. Apasă VERIFY și trimitem un Insider să confirme fizic.</div>'+
    '</div>';
  }

  // ── 4. VERIFY — podul spre VV Pulse ──
  if(loc){
    var lat=parseFloat(loc.lat),lng=parseFloat(loc.lon);
    var inRo=lat>=RO.latMin&&lat<=RO.latMax&&lng>=RO.lngMin&&lng<=RO.lngMax;
    var hasFresh=hasMissions&&missions.some(function(m){return m.createdAt&&Date.now()-m.createdAt.toDate().getTime()<7*86400000;});
    var name=loc.display_name.split(',')[0];
    var vid='v'+Date.now();
    var verifyTitles={access:'Verifică accesibilitate fizic',urgent:'Verifică situația acum',biz:'Verifică condiții business',safe:'Verifică siguranța zonei'};
    var vtitle=layer&&verifyTitles[layer]?verifyTitles[layer]:'Trimite un Insider să verifice';

    if(inRo&&!hasFresh){
      html+='<div class="answer-card">'+
        '<div class="verify-wrap">'+
          '<div class="verify-label">VERIFY REALITY — CERTITUDINE 100%</div>'+
          '<button class="verify-btn" id="'+vid+'" onclick="doVerify(\''+vid+'\',\''+name.replace(/'/g,"\\'")+'\','+lat.toFixed(4)+','+lng.toFixed(4)+',\''+layer+'\')">'+
            '<span class="vb-icon">⚡</span>'+
            '<span class="vb-body"><span class="vb-title">'+vtitle+'</span>'+
              '<span class="vb-sub">Insider merge fizic · VV Proof foto · −10 VV · Insider +10 VV</span>'+
            '</span>'+
          '</button>'+
          '<div class="flash-status" id="fs-'+vid+'"><div class="fp"></div><span id="ft-'+vid+'">Se caută cel mai apropiat Insider...</span></div>'+
        '</div>'+
      '</div>';
    } else if(hasFresh){
      html+='<div class="answer-card" style="border-color:rgba(52,199,89,.12)">'+
        '<div class="card-src"><div class="src-dot dot-green"></div>VV PROOF · RECENT</div>'+
        '<div class="answer-text" style="font-size:13px">✓ Verificat recent de Insideri. Datele de mai sus sunt din teren.</div>'+
      '</div>';
    }
  }

  // ── 5. PILLS ──
  html+=buildPills(q,layer);

  // ── 6. PREMIUM NOTE ──
  html+='<div class="premium-note">Acces Standard · România · 30 zile <b>→ Premium · Global · 90 zile · 9€</b></div>';

  res.innerHTML=html;
}

  var res=document.getElementById('results');
  var cached=getHist();
  var html='<div class="offline-card">'+
    '<div class="card-src"><div class="src-dot" style="background:var(--orange)"></div>MOD OFFLINE · CACHE LOCAL</div>'+
    '<div class="answer-text">Fără conexiune internet. Răspund din datele salvate local pe device-ul tău.</div>'+

// ── SHARE ─────────────────────────────────────────────────────
function buildShareRow(q,text){

function copyLink(){
  navigator.clipboard.writeText('https://vv-technologies.github.io/vv-nexus/vv-now.html')
    .then(function(){showToast('Link copiat!');})
    .catch(function(){showToast('vv-technologies.github.io/vv-nexus/vv-now.html');});

// ── PILLS ─────────────────────────────────────────────────────
function buildPills(q,layer){
  var l=q.toLowerCase();
  var pills=[];
  if(l.includes('kaufland')||l.includes('lidl')||l.includes('supermarket'))pills=['Parcare în zonă?','Farmacie aproape','Alt supermarket'];
  else if(l.includes('cafenea')||l.includes('restaurant'))pills=['E deschis acum?','Terasă liberă?','Loc disponibil?'];
  else if(l.includes('lift')||l.includes('acces')||l.includes('rampă'))pills=['Toaletă accesibilă?','Transport alternativ','Rampa liberă?'];
  else if(l.includes('parcare'))pills=['Parcare gratuită?','Stație EV?','Parcare subterană'];
  else if(layer==='biz')pills=['Intrare marfă liberă?','Trafic în zonă?','Zona de încărcare'];
  else pills=['Cum e zona acum?','Coadă în zonă?','Misiuni active'];
  return '<div class="pills">'+pills.map(function(p){
    return '<div class="pill" onclick="doSearch(\''+p+'\')">' +p+'</div>';
  }).join('')+'</div>';
}

// ── VERIFY / FLASH MISSION ────────────────────────────────────
async function doVerify(vid,locName,lat,lng,layer){
  var btn=document.getElementById(vid);
  var fs=document.getElementById('fs-'+vid);
  var ft=document.getElementById('ft-'+vid);
  if(!btn)return;
  btn.classList.add('done');
  if(fs)fs.classList.add('on');
  try{
    var alias=_alias||'INSIDER';
    var descs={access:'VERIFY ACCESIBILITATE: '+locName+' — lifturi, rampe, borduri.',urgent:'VERIFY URGENT: '+locName+' — situație în timp real.',biz:'VERIFY BUSINESS: '+locName+' — condiții livrare/pickup.',safe:'VERIFY SIGURANȚĂ: '+locName+' — condiții și iluminat.'};
    var desc=layer&&descs[layer]?descs[layer]:'VERIFY: '+locName+' — situație reală cu VV Proof.';
    var ref=await db.collection('missions').add({
      type:'flash_mission',description:desc,
      location:locName,lat,lng,reward:10,status:'pending',
      requestedBy:alias,isFlash:true,source:'vv_now',layer:layer||null,
      flashExpires:firebase.firestore.Timestamp.fromDate(new Date(Date.now()+30*60*1000)),
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    await db.collection('inbox').add({
      to:'CEO',from:alias,alias,type:'flash_mission_created',
      message:'⚡ Flash Mission'+(layer?' ['+LAYERS[layer].label+']':'')+': '+locName+' · #'+ref.id.substring(0,8),
      missionId:ref.id,read:false,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    db.collection('vvhi_dataset').add({
      action:'VERIFY_REQUESTED',
      context:{location:locName,lat:parseFloat(lat.toFixed(3)),lng:parseFloat(lng.toFixed(3)),layer:layer||null,hour:new Date().getHours()},
      timestamp:firebase.firestore.FieldValue.serverTimestamp()
    }).catch(function(){});
    if(ft)ft.textContent='Misiune lansată. Insider confirmă în ~20 minute.';
    showToast('⚡ Misiune Flash lansată');
    var unsub=db.collection('missions').doc(ref.id).onSnapshot(function(doc){
      if(!doc.exists)return;
      if(doc.data().status==='approved'){
        if(ft)ft.textContent='✅ Insider a confirmat! Dovada e în VV Pulse.';
        if(fs)fs.style.borderColor='rgba(52,199,89,.3)';
        showToast('✅ Confirmat!');
        unsub();
      }
    });
    setTimeout(function(){try{unsub();}catch(e){}},35*60*1000);
  }catch(e){
    if(btn)btn.classList.remove('done');
    if(fs)fs.classList.remove('on');
    showToast('Eroare. Încearcă din nou.');
  }
}

// ── PULSE FEED ────────────────────────────────────────────────
async function loadPulse(){
  try{
    var snap=await db.collection('vvhi_dataset').orderBy('timestamp','desc').limit(1).get();
    if(snap.empty)return;
    var d=snap.docs[0].data();
    var ago='';
    if(d.timestamp){var diff=Math.floor((Date.now()-d.timestamp.toDate().getTime())/60000);ago=diff<1?'acum':diff<60?diff+'m':Math.floor(diff/60)+'h';}
    var acts={'VV_NOW_SEARCH':'Căutare în VV NOW','VV_PULSE_CONNECT':'Pulse confirmat','VERIFY_REQUESTED':'Misiune Flash lansată','APPROVE_MISSION':'Verificare completată'};
    var txt=acts[d.action]||'Activitate în ecosistem';
    var el=document.getElementById('pf-text');
    if(el)el.textContent=txt+' · '+ago;
  }catch(e){}
}

// ── UTILS ─────────────────────────────────────────────────────
function goBack(){
  document.getElementById('hero').classList.remove('compact');
  document.getElementById('hdr').classList.remove('solid');
  document.getElementById('results').classList.remove('show');
  document.getElementById('results').innerHTML='';
  document.getElementById('search-input').value='';
  document.getElementById('back-btn').classList.remove('show');
  renderHist();
  setTimeout(function(){document.getElementById('search-input').focus();},400);
}
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('on');},3000);
}
document.addEventListener('keydown',function(e){
  if(e.key==='Escape')goBack();
  if(e.key==='/'&&!['INPUT','TEXTAREA'].includes(document.activeElement.tagName)){
    e.preventDefault();document.getElementById('search-input').focus();
  }
});
window.addEventListener('scroll',function(){
  if(window.scrollY>20)document.getElementById('hdr').classList.add('solid');
  else if(!document.getElementById('hero').classList.contains('compact'))document.getElementById('hdr').classList.remove('solid');
});

// ── GREETING CONTEXTUAL ──────────────────────────────────────
function setContextualGreeting() {
  var h = new Date().getHours();
  var city = localStorage.getItem('vvme_home_city') || null;
  var persona = localStorage.getItem('vv_persona') || null;
  var citizenCode = localStorage.getItem('vv_citizen_code') || null;
  
  var period = h>=5&&h<12?'dimineața':h>=12&&h<17?'după-amiaza':h>=17&&h<21?'seara':'noaptea';
  var greeting = h>=5&&h<12?'Bună dimineața':h>=12&&h<17?'Bună ziua':h>=17&&h<21?'Bună seara':'Noapte bună';
  
  var sub = document.getElementById('hero-contextual');
  if (!sub) return;
  
  if (city && persona === 'insider') {
    sub.innerHTML = greeting + '. <strong style="color:var(--w)">' + city + ', ' + period + '</strong> — ce misiune lansăm?';
  } else if (city && persona === 'seeker') {
    sub.innerHTML = greeting + '. <strong style="color:var(--w)">' + city + ', ' + period + '</strong> — ce vrei să știi?';
  } else if (city) {
    sub.innerHTML = greeting + '. Ești în <strong style="color:var(--w)">' + city + '</strong>. VV Lea e pregătită.';
  } else {
    sub.textContent = 'VV Lea știe orașul tău. Insiderii confirmă fizic.';
  }
  
  // Update search placeholder
  var inp = document.getElementById('search-input');
  if (inp && city) {
    inp.placeholder = 'Ce vrei să știi despre ' + city + (h>=20||h<5?' noaptea?':h>=17?' seara?':'?');
  }
}
