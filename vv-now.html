<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000">
<title>VV NOW</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#D4AF37;
  --gold-soft:rgba(212,175,55,0.15);
  --gold-b:rgba(212,175,55,0.2);
  --white:#fff;
  --w70:rgba(255,255,255,0.7);
  --w40:rgba(255,255,255,0.4);
  --w20:rgba(255,255,255,0.2);
  --w10:rgba(255,255,255,0.1);
  --w06:rgba(255,255,255,0.06);
  --w03:rgba(255,255,255,0.03);
  --border:rgba(255,255,255,0.08);
  --green:#34c759;
  --font:'Syne',sans-serif;
  --body:'DM Sans',sans-serif;
}
html,body{
  min-height:100vh;
  background:#000;
  color:var(--white);
  font-family:var(--body);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ── HEADER ── */
.hdr{
  position:fixed;top:0;left:0;right:0;
  z-index:100;
  padding:16px 28px;
  display:flex;align-items:center;justify-content:space-between;
}
.hdr-logo{
  font-family:var(--font);font-weight:900;
  font-size:17px;letter-spacing:6px;color:var(--gold);
  text-decoration:none;
  display:flex;align-items:center;gap:6px;
}
.hdr-logo span{
  font-size:9px;letter-spacing:2px;color:var(--w40);
  font-family:var(--body);font-weight:400;
  border-left:1px solid var(--border);padding-left:8px;
}
.hdr-nav{display:flex;gap:8px;}
.hdr-link{
  padding:6px 14px;background:var(--w06);border:0.5px solid var(--border);
  border-radius:20px;font-size:11px;color:var(--w40);
  text-decoration:none;transition:all .15s;
}
.hdr-link:hover{color:var(--w70);background:var(--w10);}

/* ── HERO — bara singura pe ecran ── */
.hero{
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:80px 24px;
  transition:all .4s cubic-bezier(.16,1,.3,1);
}
.hero.compact{
  min-height:auto;
  padding:90px 24px 20px;
  justify-content:flex-start;
}

/* Hexagon mic, discret */
.logo-mark{
  width:48px;height:48px;
  border-radius:50%;
  border:1px solid rgba(212,175,55,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;margin-bottom:28px;
  background:rgba(212,175,55,.04);
  transition:all .4s;
}
.hero.compact .logo-mark{display:none;}

.hero-title{
  font-family:var(--font);
  font-size:clamp(28px,4vw,48px);
  font-weight:900;letter-spacing:-1px;
  text-align:center;margin-bottom:8px;
  line-height:1.1;
  transition:all .4s;
}
.hero.compact .hero-title{display:none;}
.hero-title .g{color:var(--gold);}

.hero-sub{
  font-size:15px;color:var(--w40);
  text-align:center;margin-bottom:36px;
  font-weight:300;
  transition:all .4s;
}
.hero.compact .hero-sub{display:none;}

/* Search bar — PRINCIPALA */
.search-wrap{
  width:100%;max-width:600px;
  position:relative;
}
.search-input{
  width:100%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(212,175,55,0.25);
  border-radius:100px;
  padding:18px 64px 18px 28px;
  color:var(--white);
  font-family:var(--body);font-size:16px;font-weight:400;
  outline:none;
  transition:all .25s;
  -webkit-appearance:none;
}
.search-input::placeholder{color:var(--w40);}
.search-input:focus{
  border-color:rgba(212,175,55,.5);
  background:rgba(255,255,255,.08);
}
.search-go{
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  width:46px;height:46px;
  background:var(--gold);color:#000;
  border:none;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:opacity .15s;
}
.search-go:active{opacity:.8;}

/* Sugestii */
.suggestions{
  display:flex;gap:8px;flex-wrap:wrap;
  justify-content:center;margin-top:20px;
  max-width:600px;
  transition:all .4s;
}
.hero.compact .suggestions{display:none;}
.sug{
  padding:7px 16px;
  background:var(--w03);border:0.5px solid var(--border);
  border-radius:100px;font-size:12px;color:var(--w40);
  cursor:pointer;transition:all .15s;
}
.sug:hover{background:var(--gold-soft);border-color:var(--gold-b);color:var(--gold);}

/* Istoric */
.history{
  margin-top:28px;width:100%;max-width:500px;
  transition:all .4s;
}
.hero.compact .history{display:none;}
.hist-label{
  font-size:10px;color:var(--w20);letter-spacing:2px;
  text-align:center;margin-bottom:10px;
}
.hist-list{display:flex;flex-direction:column;gap:4px;}
.hist-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;
  background:var(--w03);border:0.5px solid var(--border);
  border-radius:12px;cursor:pointer;transition:all .15s;
}
.hist-item:hover{background:var(--w06);border-color:var(--w10);}
.hist-q{flex:1;font-size:13px;color:var(--w40);}
.hist-t{font-size:11px;color:var(--w20);}

/* ── RESULTS — card simplu, uman ── */
.results{
  width:100%;max-width:640px;
  margin:0 auto;
  padding:0 24px 80px;
  display:none;
}
.results.show{display:block;}

/* Nexus answer — principalul card */
.answer-card{
  background:rgba(255,255,255,.04);
  border:0.5px solid rgba(255,255,255,.1);
  border-radius:20px;
  padding:24px 26px;
  margin-bottom:12px;
  animation:fadeUp .4s cubic-bezier(.16,1,.3,1);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.answer-source{
  display:flex;align-items:center;gap:6px;
  font-size:10px;color:var(--w20);
  letter-spacing:1px;margin-bottom:12px;
}
.answer-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--gold);
}
.answer-text{
  font-size:16px;color:var(--w70);
  line-height:1.75;font-weight:400;
}
.answer-text strong{color:var(--white);font-weight:500;}

/* Location card */
.loc-card{
  background:var(--w03);
  border:0.5px solid rgba(212,175,55,.15);
  border-radius:20px;
  padding:20px 24px;
  margin-bottom:12px;
  animation:fadeUp .4s cubic-bezier(.16,1,.3,1) .06s both;
}
.loc-name{
  font-family:var(--font);font-size:18px;font-weight:800;
  margin-bottom:4px;
}
.loc-addr{font-size:13px;color:var(--w40);margin-bottom:14px;}

/* VERIFY — buton central, clar */
.verify-btn{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:14px 20px;
  background:rgba(212,175,55,.1);
  border:0.5px solid rgba(212,175,55,.3);
  border-radius:14px;cursor:pointer;
  transition:all .2s;
  font-family:var(--body);
}
.verify-btn:hover{background:rgba(212,175,55,.16);}
.verify-btn-icon{font-size:16px;}
.verify-btn-text{flex:1;text-align:left;}
.verify-btn-title{font-size:13px;font-weight:500;color:var(--gold);display:block;}
.verify-btn-sub{font-size:11px;color:var(--w40);display:block;margin-top:1px;}
.verify-btn-arrow{font-size:14px;color:var(--w20);}

/* Status dupa VERIFY */
.verify-status{
  display:none;
  align-items:center;gap:10px;
  padding:12px 16px;margin-top:10px;
  background:rgba(52,199,89,.06);
  border:0.5px solid rgba(52,199,89,.2);
  border-radius:12px;
  font-size:13px;color:var(--green);
}
.verify-status.show{display:flex;}
.status-pulse{
  width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0;
  animation:sp 1.2s ease-in-out infinite;
}
@keyframes sp{0%,100%{opacity:1}50%{opacity:.2}}

/* Geo blocked */
.geo-note{
  padding:12px 16px;margin-top:10px;
  background:rgba(255,149,0,.06);border:0.5px solid rgba(255,149,0,.15);
  border-radius:12px;font-size:12px;color:rgba(255,149,0,.7);
}

/* Context card — mic, discret, ultimul */
.context-card{
  background:var(--w03);border:0.5px solid var(--border);
  border-radius:16px;padding:16px 20px;
  margin-bottom:12px;
  animation:fadeUp .4s cubic-bezier(.16,1,.3,1) .12s both;
  font-size:13px;color:var(--w40);line-height:1.7;
}

/* Blocked */
.blocked-card{
  background:rgba(255,59,48,.04);border:0.5px solid rgba(255,59,48,.12);
  border-radius:20px;padding:24px 26px;
  animation:fadeUp .4s cubic-bezier(.16,1,.3,1);
}
.blocked-text{font-size:15px;color:rgba(255,59,48,.6);line-height:1.7;}

/* Loading — bara subtila */
.load-line{
  position:fixed;top:0;left:0;right:0;height:2px;
  background:transparent;z-index:999;display:none;
}
.load-line.on{display:block;}
.load-fill{
  height:100%;
  background:linear-gradient(90deg,var(--gold),rgba(212,175,55,.3));
  animation:ldLine 1.4s ease-in-out infinite;
}
@keyframes ldLine{0%{width:0;margin-left:0}50%{width:70%;margin-left:15%}100%{width:0;margin-left:100%}}

/* Toast */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(6px);
  background:rgba(10,10,14,.96);
  border:0.5px solid var(--w10);border-radius:100px;
  padding:10px 22px;font-size:12px;color:var(--w70);
  opacity:0;transition:all .25s;pointer-events:none;z-index:999;
  white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* Mobile */
@media(max-width:600px){
  .hdr{padding:12px 16px;}
  .hero-title{font-size:26px;}
  .search-input{font-size:15px;padding:16px 56px 16px 20px;}
  .hdr-nav{display:none;}
}
</style>
</head>
<body>

<div class="load-line" id="load"><div class="load-fill"></div></div>
<div id="toast"></div>

<!-- HEADER -->
<header class="hdr">
  <a href="https://vv-technologies.github.io/vv-nexus/" class="hdr-logo">
    VV <span>NOW</span>
  </a>
  <nav class="hdr-nav">
    <a href="https://vv-technologies.github.io/vv-beta" class="hdr-link">VV Beta</a>
    <a href="https://vv-technologies.github.io/vv-nexus/vv-pulse.html" class="hdr-link">Pulse Map</a>
  </nav>
</header>

<!-- HERO -->
<div class="hero" id="hero">

  <div class="logo-mark">⬡</div>

  <h1 class="hero-title">
    Internetul se termină.<br>
    <span class="g">Realitatea începe.</span>
  </h1>
  <p class="hero-sub">Nexus găsește. Insiderii verifică fizic. Tu afli adevărul.</p>

  <div class="search-wrap">
    <input class="search-input" id="search-input" type="text"
      placeholder="Ce vrei să știi despre orașul tău?"
      onkeydown="if(event.key==='Enter')search(this.value)">
    <button class="search-go" onclick="search(document.getElementById('search-input').value)">→</button>
  </div>

  <div class="suggestions">
    <div class="sug" onclick="search('E coadă la Kaufland?')">🛒 Kaufland</div>
    <div class="sug" onclick="search('Cum e Centrul Vechi acum?')">🌆 Centrul Vechi</div>
    <div class="sug" onclick="search('Loc de parcare Piața Victoriei')">🚗 Parcare</div>
    <div class="sug" onclick="search('Cafenele liniștite în Floreasca')">☕ Cafenele</div>
    <div class="sug" onclick="search('Teren de fotbal liber')">⚽ Sport</div>
    <div class="sug" onclick="search('Cum e traficul acum?')">🚦 Trafic</div>
  </div>

  <div class="history" id="history"></div>

</div>

<!-- RESULTS -->
<div class="results" id="results"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
if (!firebase.apps.length) {
  firebase.initializeApp({
    apiKey:"AIzaSyDGv4kEClO0RHCLvXVLOT-vyPHw6bsxYVc",
    authDomain:"vv-ep-beta.firebaseapp.com",
    projectId:"vv-ep-beta"
  });
}
var db = firebase.firestore();

// ── CONSTANTE ──────────────────────────────────────────────────
var BLOCKED = ['porn','sex explicit','drog','cocain','heroina','arma','bomba','secta','frauda','hack','ura','rasism','prostitutie','trafic uman'];
var RO = { latMin:43.6, latMax:48.3, lngMin:20.2, lngMax:30.0 };
var IDB_TTL = 24 * 60 * 60 * 1000;

// ── STATE ──────────────────────────────────────────────────────
var _gps = null;
var _idb = null;
var _alias = localStorage.getItem('vv_alias') || null;
var _lvl = 1;
try {
  var _s = JSON.parse(localStorage.getItem('vv_core_stats') || '{}');
  _lvl = _s.experience_level || 1;
} catch(e) {}

// ── IndexedDB ─────────────────────────────────────────────────
function openIDB() {
  return new Promise(function(res) {
    try {
      var r = indexedDB.open('vvnow', 1);
      r.onupgradeneeded = function(e) {
        e.target.result.createObjectStore('loc', { keyPath: 'k' });
      };
      r.onsuccess = function(e) { _idb = e.target.result; res(); };
      r.onerror = function() { res(); };
    } catch(e) { res(); }
  });
}
function cacheGet(k) {
  return new Promise(function(res) {
    if (!_idb) { res(null); return; }
    try {
      var r = _idb.transaction('loc','readonly').objectStore('loc').get(k);
      r.onsuccess = function() {
        var d = r.result;
        if (!d || Date.now()-d.ts > IDB_TTL) { res(null); return; }
        res(d.v);
      };
      r.onerror = function() { res(null); };
    } catch(e) { res(null); }
  });
}
function cacheSet(k, v) {
  if (!_idb) return;
  try {
    _idb.transaction('loc','readwrite').objectStore('loc').put({ k, v, ts: Date.now() });
  } catch(e) {}
}

// ── GPS ────────────────────────────────────────────────────────
function getGPS() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    function(p) { _gps = { lat: p.coords.latitude, lng: p.coords.longitude }; },
    function() {},
    { enableHighAccuracy: true, timeout: 8000 }
  );
}

// ── HISTORY local ─────────────────────────────────────────────
function getHist() {
  try { return JSON.parse(localStorage.getItem('vvnow_h') || '[]'); } catch(e) { return []; }
}
function addHist(q) {
  var h = getHist().filter(function(x){ return x.q !== q; });
  h.unshift({ q, t: Date.now() });
  localStorage.setItem('vvnow_h', JSON.stringify(h.slice(0,5)));
}
function renderHist() {
  var h = getHist();
  var el = document.getElementById('history');
  if (!el || h.length === 0) return;
  var ago = function(ts) {
    var d = Math.floor((Date.now()-ts)/60000);
    return d < 1 ? 'acum' : d < 60 ? d+'m' : Math.floor(d/60)+'h';
  };
  el.innerHTML = '<div class="hist-label">CĂUTĂRI RECENTE</div>' +
    '<div class="hist-list">' +
    h.map(function(i) {
      return '<div class="hist-item" onclick="search(\'' + i.q.replace(/'/g,"\\'") + '\')">' +
        '<span class="hist-q">' + i.q + '</span>' +
        '<span class="hist-t">' + ago(i.t) + '</span>' +
      '</div>';
    }).join('') + '</div>';
}

// ── SEARCH ────────────────────────────────────────────────────
async function search(q) {
  q = (q||'').trim();
  if (!q) return;

  addHist(q);

  // Compact hero
  document.getElementById('hero').classList.add('compact');
  document.getElementById('search-input').value = q;

  // Show results area
  var res = document.getElementById('results');
  res.innerHTML = '';
  res.classList.add('show');

  // Loading
  document.getElementById('load').classList.add('on');

  // Charter check
  var blocked = BLOCKED.some(function(k){ return q.toLowerCase().includes(k); });
  if (blocked) {
    document.getElementById('load').classList.remove('on');
    res.innerHTML = blockedHtml();
    logSearch(q, 'BLOCKED');
    return;
  }

  // Cauta locatie
  var loc = await findLoc(q);

  // Render
  document.getElementById('load').classList.remove('on');
  renderResults(q, loc);
  logSearch(q, 'OK');
}

// ── NOMINATIM cu cache ─────────────────────────────────────────
async function findLoc(q) {
  var term = getTerm(q);
  if (!term) return null;
  var ck = term.toLowerCase().replace(/\s+/g,'_');

  // Cache first
  var cached = await cacheGet(ck);
  if (cached) return cached;

  try {
    var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' +
      encodeURIComponent(term) + '&limit=1&accept-language=ro&countrycodes=ro';
    if (_gps) url += '&viewbox='+(_gps.lng-.12)+','+(_gps.lat+.12)+','+(_gps.lng+.12)+','+(_gps.lat-.12)+'&bounded=0';
    var r = await fetch(url);
    var d = await r.json();
    if (d && d[0]) { cacheSet(ck, d[0]); return d[0]; }
  } catch(e) {}
  return null;
}

function getTerm(q) {
  var map = {
    'kaufland':'Kaufland','lidl':'Lidl','penny':'Penny Market','profi':'Profi',
    'mega':'Mega Image','auchan':'Auchan','carrefour':'Carrefour',
    'parcare':'parcare','teren':'teren sport','fotbal':'teren fotbal',
    'cafenea':'cafenea','restaurant':'restaurant','pizza':'pizza',
    'parc':'parc','mall':'mall','spital':'spital','farmacie':'farmacie',
    'atm':'ATM bancomat','centrul vechi':'Centrul Vechi Bucuresti',
    'floreasca':'Floreasca Bucuresti','victoriei':'Piata Victoriei',
    'unirii':'Piata Unirii','herastrau':'Herastrau','obor':'Piata Obor',
    'trafic':'trafic strada','kiseleff':'Kiseleff'
  };
  var l = q.toLowerCase();
  for (var k in map) { if (l.includes(k)) return map[k]; }
  return q.split(' ').slice(0,4).join(' ');
}

// ── RENDER REZULTATE ──────────────────────────────────────────
function renderResults(q, loc) {
  var res = document.getElementById('results');
  var html = '';

  // 1. Raspuns uman Nexus
  html += answerHtml(q, loc);

  // 2. Location + VERIFY
  if (loc) html += locHtml(loc);

  // 3. Context discret
  html += contextHtml(q);

  res.innerHTML = html;
}

function answerHtml(q, loc) {
  var l = q.toLowerCase();
  var h = new Date().getHours();
  var ora = h<12?'dimineață':h<18?'după-amiază':h<22?'seară':'noapte';
  var text = '';

  if (loc) {
    var name = loc.display_name.split(',')[0];
    text = 'Am găsit <strong>' + name + '</strong> în zona ta. ';
    if (_lvl >= 6) text += 'La această ' + ora + ', situația poate varia. ';
    text += 'Cel mai sigur mod de a afla realitatea e să trimiți un Insider să verifice.';
  } else if (l.includes('coadă') || l.includes('aglomerat') || l.includes('liber')) {
    text = 'Asta e exact ce Insiderii VV pot verifica în timp real. Lansează o misiune și în câteva minute primești o poză din teren.';
  } else if (l.includes('cum e') || l.includes('atmosfer') || l.includes('vibe')) {
    text = 'Atmosfera nu se poate descrie prin algoritmi. ' + (_lvl>=6?'Nexus Sense detectează că ești activ '+ora+'. ':'') + 'Un Insider din zonă îți poate arăta exact cum e acum.';
  } else if (l.includes('trafic')) {
    text = 'Traficul se schimbă rapid. Un Insider care trece pe acolo acum îți poate spune în câteva minute cum e situația reală.';
  } else {
    text = 'Nexus a procesat cererea ta. Informațiile online îmbătrânesc rapid — un Insider verifică pe loc și îți aduce dovada fizică.';
  }

  return '<div class="answer-card">' +
    '<div class="answer-source"><div class="answer-dot"></div> Nexus' + (_lvl>=6?' Sense · Level '+_lvl:'') + '</div>' +
    '<div class="answer-text">' + text + '</div>' +
  '</div>';
}

function locHtml(loc) {
  var name = loc.display_name.split(',')[0];
  var addr = loc.display_name.split(',').slice(0,3).join(', ');
  var lat = parseFloat(loc.lat);
  var lng = parseFloat(loc.lon);
  var inRo = lat>=RO.latMin&&lat<=RO.latMax&&lng>=RO.lngMin&&lng<=RO.lngMax;
  var vid = 'v'+Date.now();
  var days = Math.floor(Math.random()*40)+2;

  var verifySection = '';
  if (!inRo) {
    verifySection = '<div class="geo-note">VERIFY disponibil doar în România în faza Beta.</div>';
  } else {
    verifySection = '<button class="verify-btn" id="' + vid + '" onclick="doVerify(\'' + vid + '\',\'' + name.replace(/'/g,"\\'") + '\',' + lat.toFixed(4) + ',' + lng.toFixed(4) + ')">' +
      '<span class="verify-btn-icon">⚡</span>' +
      '<span class="verify-btn-text">' +
        '<span class="verify-btn-title">Trimite un Insider să verifice</span>' +
        '<span class="verify-btn-sub">Ultima verificare: acum ' + days + ' zile · −10 VV · Insider +10 VV</span>' +
      '</span>' +
      '<span class="verify-btn-arrow">›</span>' +
    '</button>' +
    '<div class="verify-status" id="vs-' + vid + '">' +
      '<div class="status-pulse"></div>' +
      '<span id="vt-' + vid + '">Se caută cel mai apropiat Insider...</span>' +
    '</div>';
  }

  return '<div class="loc-card">' +
    '<div class="loc-name">' + name + '</div>' +
    '<div class="loc-addr">' + addr + '</div>' +
    verifySection +
  '</div>';
}

function contextHtml(q) {
  var h = new Date().getHours();
  var tip = h>=8&&h<12 ? 'Dimineața e ideal pentru verificat locații — puțini oameni, Insideri activi.' :
            h>=12&&h<16 ? 'La prânz zonele comerciale sunt cel mai aglomerate. Bun moment pentru un VERIFY.' :
            h>=16&&h<20 ? 'Seara devreme e cel mai activ interval în ecosistemul VV.' :
            'Noaptea, timpul de răspuns poate fi puțin mai lung.';
  return '<div class="context-card">' + tip + '</div>';
}

function blockedHtml() {
  return '<div class="blocked-card">' +
    '<div class="answer-source"><div class="answer-dot" style="background:rgba(255,59,48,.6)"></div> VV Charter · Blocat</div>' +
    '<div class="blocked-text">Această cerere nu poate fi procesată în ecosistemul VV. Caută ceva real despre orașul tău.</div>' +
  '</div>';
}

// ── VERIFY / FLASH MISSION ────────────────────────────────────
async function doVerify(vid, locName, lat, lng) {
  var btn = document.getElementById(vid);
  var status = document.getElementById('vs-'+vid);
  var txt = document.getElementById('vt-'+vid);
  if (!btn) return;

  btn.style.opacity = '.5';
  btn.style.pointerEvents = 'none';
  if (status) status.classList.add('show');

  try {
    var alias = _alias || 'INSIDER';
    var ref = await db.collection('missions').add({
      type:'flash_mission', description:'VERIFY: '+locName,
      location:locName, lat, lng, reward:10, status:'pending',
      requestedBy:alias, isFlash:true, source:'vv_now',
      flashExpires:firebase.firestore.Timestamp.fromDate(new Date(Date.now()+30*60*1000)),
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });

    await db.collection('inbox').add({
      to:'CEO', from:alias, alias, type:'flash_mission_created',
      message:'⚡ Flash Mission: '+locName+' · #'+ref.id.substring(0,8),
      missionId:ref.id, read:false,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });

    db.collection('vvhi_dataset').add({
      action:'VERIFY_REQUESTED',
      context:{ location:locName, lat:parseFloat(lat.toFixed(3)), lng:parseFloat(lng.toFixed(3)), hour:new Date().getHours() },
      timestamp:firebase.firestore.FieldValue.serverTimestamp()
    }).catch(function(){});

    if (txt) txt.textContent = 'Misiune lansată. Un Insider confirmă în ~20 minute.';
    showToast('⚡ Insider caută...');

    // Listener confirmare
    var unsub = db.collection('missions').doc(ref.id).onSnapshot(function(doc) {
      if (!doc.exists) return;
      if (doc.data().status === 'approved') {
        if (txt) txt.textContent = '✅ Insider a confirmat! Dovada e în VV Beta.';
        if (status) status.style.borderColor = 'rgba(52,199,89,.3)';
        showToast('✅ Confirmat!');
        unsub();
      }
    });
    setTimeout(function(){ try{unsub();}catch(e){} }, 35*60*1000);

  } catch(e) {
    if (btn) { btn.style.opacity='1'; btn.style.pointerEvents='auto'; }
    if (status) status.classList.remove('show');
    showToast('Eroare. Încearcă din nou.');
  }
}

// ── LOG ───────────────────────────────────────────────────────
function logSearch(q, status) {
  db.collection('vvhi_dataset').add({
    action:'VV_NOW_SEARCH',
    context:{ query:q.substring(0,100), status, hour:new Date().getHours() },
    timestamp:firebase.firestore.FieldValue.serverTimestamp()
  }).catch(function(){});
}

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(t._t); t._t = setTimeout(function(){ t.classList.remove('on'); }, 3000);
}

// ── KEYBOARD ──────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.getElementById('hero').classList.remove('compact');
    document.getElementById('results').classList.remove('show');
    document.getElementById('results').innerHTML = '';
    document.getElementById('search-input').value = '';
  }
});

// ── INIT ──────────────────────────────────────────────────────
openIDB().then(function() {
  getGPS();
  renderHist();
});
</script>
