<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000">
<title>VV NOW</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#D4AF37;--gold2:rgba(212,175,55,.12);--gold-b:rgba(212,175,55,.22);
  --w:#fff;--w70:rgba(255,255,255,.7);--w50:rgba(255,255,255,.5);
  --w30:rgba(255,255,255,.3);--w15:rgba(255,255,255,.15);
  --w08:rgba(255,255,255,.08);--w04:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.07);
  --green:#34c759;--blue:#0A84FF;--orange:#FF9500;--red:#ff3b30;
  --font:'Syne',sans-serif;--body:'DM Sans',sans-serif;
  /* Layer colors */
  --c-access:rgba(10,132,255,.7);
  --c-urgent:rgba(255,149,0,.7);
  --c-biz:rgba(212,175,55,.7);
  --c-safe:rgba(52,199,89,.7);
}
html,body{min-height:100vh;background:#000;color:var(--w);
  font-family:var(--body);-webkit-font-smoothing:antialiased;overflow-x:hidden;}

/* ── HEADER ── */
.hdr{
  position:fixed;top:0;left:0;right:0;z-index:200;
  padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;
  transition:background .3s;
}
.hdr.solid{background:rgba(0,0,0,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);}
.logo{font-family:var(--font);font-weight:900;font-size:17px;
  letter-spacing:6px;color:var(--gold);text-decoration:none;
  display:flex;align-items:center;gap:7px;}
.logo-sub{font-size:9px;letter-spacing:2px;color:var(--w30);
  font-family:var(--body);font-weight:400;
  border-left:1px solid var(--border);padding-left:8px;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hdr-link{padding:5px 12px;background:var(--w04);border:0.5px solid var(--border);
  border-radius:100px;font-size:11px;color:var(--w30);text-decoration:none;transition:all .15s;}
.hdr-link:hover{color:var(--w70);background:var(--w08);}
.back-btn{display:none;align-items:center;gap:5px;padding:5px 12px;
  background:var(--w04);border:0.5px solid var(--border);border-radius:100px;
  font-size:11px;color:var(--w30);cursor:pointer;transition:all .15s;font-family:var(--body);}
.back-btn:hover{color:var(--w70);background:var(--w08);}
.back-btn.show{display:flex;}

/* ── HERO ── */
.hero{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:110px 24px 60px;
  transition:all .5s cubic-bezier(.16,1,.3,1);
}
.hero.compact{min-height:auto;padding:80px 24px 16px;justify-content:flex-start;}
.hex{
  width:44px;height:44px;border-radius:50%;
  border:1px solid rgba(212,175,55,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;margin-bottom:24px;
  background:rgba(212,175,55,.04);
  animation:hexBreath 4s ease-in-out infinite;
}
.hero.compact .hex{display:none;}
@keyframes hexBreath{0%,100%{border-color:rgba(212,175,55,.2)}50%{border-color:rgba(212,175,55,.4)}}
.hero-title{
  font-family:var(--font);font-size:clamp(22px,3.2vw,42px);
  font-weight:900;letter-spacing:-1px;text-align:center;
  line-height:1.05;margin-bottom:8px;
}
.hero.compact .hero-title{display:none;}
.hero-title .g{color:var(--gold);}
.hero-sub{font-size:14px;color:var(--w30);text-align:center;
  margin-bottom:32px;font-weight:300;}
.hero.compact .hero-sub{display:none;}

/* ── SEARCH BAR ── */
.search-wrap{width:100%;max-width:580px;position:relative;}
.search-input{
  width:100%;background:rgba(255,255,255,.06);
  border:1px solid rgba(212,175,55,.22);border-radius:100px;
  padding:16px 58px 16px 24px;color:var(--w);
  font-family:var(--body);font-size:15px;font-weight:400;
  outline:none;transition:all .25s;-webkit-appearance:none;
}
.search-input::placeholder{color:var(--w30);}
.search-input:focus{border-color:rgba(212,175,55,.45);background:rgba(255,255,255,.08);}
.search-go{
  position:absolute;right:6px;top:50%;transform:translateY(-50%);
  width:42px;height:42px;background:var(--gold);color:#000;
  border:none;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;transition:opacity .15s;
}
.search-go:active{opacity:.8;}

/* ── LAYERS — filtre contextuale ── */
.layers{
  display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;justify-content:center;
  max-width:580px;transition:all .3s;
}
.hero.compact .layers{justify-content:flex-start;}
.layer{
  display:flex;align-items:center;gap:6px;
  padding:6px 14px;
  background:var(--w04);border:0.5px solid var(--border);
  border-radius:100px;font-size:11px;color:var(--w30);
  cursor:pointer;transition:all .2s;font-weight:500;
  position:relative;
}
.layer:hover{background:var(--w08);color:var(--w70);}
.layer.active{color:var(--w);border-color:var(--layer-color,var(--gold));}
.layer.active{background:rgba(var(--layer-rgb,.2),0.12);}
.layer-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.l-access .layer-dot{background:var(--c-access);}
.l-access.active{border-color:rgba(10,132,255,.4);background:rgba(10,132,255,.08);color:var(--c-access);}
.l-urgent .layer-dot{background:var(--c-urgent);}
.l-urgent.active{border-color:rgba(255,149,0,.4);background:rgba(255,149,0,.08);color:var(--c-urgent);}
.l-biz .layer-dot{background:var(--c-biz);}
.l-biz.active{border-color:rgba(212,175,55,.4);background:rgba(212,175,55,.08);color:var(--c-biz);}
.l-safe .layer-dot{background:var(--c-safe);}
.l-safe.active{border-color:rgba(52,199,89,.4);background:rgba(52,199,89,.08);color:var(--c-safe);}

/* Sugestii rapide */
.suggestions{
  display:flex;gap:8px;flex-wrap:wrap;
  justify-content:center;margin-top:16px;max-width:580px;
}
.hero.compact .suggestions{display:none;}
.sug{padding:6px 14px;background:var(--w04);border:0.5px solid var(--border);
  border-radius:100px;font-size:12px;color:var(--w30);
  cursor:pointer;transition:all .15s;}
.sug:hover{background:var(--gold2);border-color:var(--gold-b);color:var(--gold);}

/* Istoric */
.history{margin-top:24px;width:100%;max-width:500px;}
.hero.compact .history{display:none;}
.hist-label{font-size:9px;color:var(--w15);letter-spacing:2px;text-align:center;margin-bottom:8px;}
.hist-list{display:flex;flex-direction:column;gap:3px;}
.hist-item{display:flex;align-items:center;gap:10px;padding:9px 14px;
  background:var(--w04);border:0.5px solid var(--border);
  border-radius:10px;cursor:pointer;transition:all .15s;}
.hist-item:hover{background:var(--w08);}
.hist-q{flex:1;font-size:12px;color:var(--w30);}
.hist-layer{font-size:9px;padding:2px 7px;border-radius:100px;
  background:var(--w04);color:var(--w30);}
.hist-t{font-size:10px;color:var(--w15);}

/* ── RESULTS ── */
.results{width:100%;max-width:620px;margin:0 auto;padding:0 24px 80px;display:none;}
.results.show{display:block;}

/* Loading */
.load-line{position:fixed;top:0;left:0;right:0;height:2px;z-index:999;display:none;}
.load-line.on{display:block;}
.load-fill{height:100%;background:linear-gradient(90deg,transparent,var(--gold),rgba(212,175,55,.6),var(--gold),transparent);
  animation:ldAnim 1.4s ease-in-out infinite;}
@keyframes ldAnim{0%{width:0;margin-left:0}50%{width:65%;margin-left:18%}100%{width:0;margin-left:100%}}

/* Answer card */
.answer-card{
  background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.1);
  border-radius:18px;padding:22px 24px;margin-bottom:10px;
  animation:fadeUp .35s cubic-bezier(.16,1,.3,1) both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.answer-card:nth-child(2){animation-delay:.05s}
.answer-card:nth-child(3){animation-delay:.1s}
.answer-card:nth-child(4){animation-delay:.15s}

.card-source{display:flex;align-items:center;gap:6px;
  font-size:9px;color:var(--w30);letter-spacing:1.5px;margin-bottom:10px;}
.src-dot{width:5px;height:5px;border-radius:50%;}
.src-gold{background:var(--gold);}
.src-green{background:var(--green);}
.src-blue{background:var(--blue);}
.src-orange{background:var(--orange);}

.answer-text{font-size:15px;color:var(--w70);line-height:1.75;font-weight:400;}
.answer-text strong{color:var(--w);font-weight:500;}

/* Loc card */
.loc-name{font-family:var(--font);font-size:17px;font-weight:800;margin-bottom:3px;}
.loc-addr{font-size:12px;color:var(--w30);margin-bottom:14px;}

/* Data badge */
.data-badge{display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:100px;font-size:10px;font-weight:500;margin-bottom:10px;}
.db-fresh{background:rgba(52,199,89,.08);border:0.5px solid rgba(52,199,89,.2);color:var(--green);}
.db-old{background:rgba(255,149,0,.08);border:0.5px solid rgba(255,149,0,.2);color:var(--orange);}
.db-none{background:var(--w04);border:0.5px solid var(--border);color:var(--w30);}

/* Proof items */
.proof-item{padding:10px 0;border-bottom:0.5px solid var(--border);
  font-size:13px;color:var(--w70);line-height:1.6;}
.proof-item:last-child{border-bottom:none;}
.proof-meta{font-size:11px;color:var(--w30);margin-top:2px;}

/* VERIFY button */
.verify-btn{
  display:flex;align-items:center;gap:10px;width:100%;
  padding:13px 18px;background:rgba(212,175,55,.08);
  border:0.5px solid rgba(212,175,55,.25);border-radius:12px;
  cursor:pointer;transition:all .2s;font-family:var(--body);
  text-align:left;
}
.verify-btn:hover{background:rgba(212,175,55,.14);}
.verify-btn.done{opacity:.5;pointer-events:none;}
.vb-icon{font-size:15px;flex-shrink:0;}
.vb-body{flex:1;}
.vb-title{font-size:13px;font-weight:500;color:var(--gold);display:block;}
.vb-sub{font-size:11px;color:var(--w30);display:block;margin-top:1px;}
.vb-arrow{font-size:13px;color:var(--w15);}

/* Status Flash */
.flash-status{display:none;align-items:center;gap:8px;
  margin-top:8px;padding:10px 14px;
  background:rgba(52,199,89,.05);border:0.5px solid rgba(52,199,89,.18);
  border-radius:10px;font-size:12px;color:var(--green);}
.flash-status.on{display:flex;}
.fp{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;
  animation:fp 1.1s ease-in-out infinite;}
@keyframes fp{0%,100%{opacity:1}50%{opacity:.2}}

/* Pills — sugestii discrete dupa search */
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.pill{padding:5px 12px;background:var(--w04);border:0.5px solid var(--border);
  border-radius:100px;font-size:11px;color:var(--w30);cursor:pointer;transition:all .15s;}
.pill:hover{background:var(--gold2);border-color:var(--gold-b);color:var(--gold);}

/* Layer indicator pe card */
.layer-badge{display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:100px;font-size:9px;font-weight:600;
  letter-spacing:1px;margin-bottom:8px;}
.lb-access{background:rgba(10,132,255,.08);border:0.5px solid rgba(10,132,255,.2);color:var(--c-access);}
.lb-urgent{background:rgba(255,149,0,.08);border:0.5px solid rgba(255,149,0,.2);color:var(--c-urgent);}
.lb-biz{background:rgba(212,175,55,.08);border:0.5px solid rgba(212,175,55,.2);color:var(--c-biz);}
.lb-safe{background:rgba(52,199,89,.08);border:0.5px solid rgba(52,199,89,.2);color:var(--c-safe);}

/* Premium note */
.premium-note{
  margin-top:8px;padding:11px 16px;
  background:var(--w04);border:0.5px solid var(--border);
  border-radius:12px;display:flex;align-items:center;
  justify-content:space-between;gap:10px;
  font-size:11px;color:var(--w30);
}
.premium-note b{color:var(--gold);font-size:11px;white-space:nowrap;}

/* Blocked */
.blocked-card{background:rgba(255,59,48,.03);border:0.5px solid rgba(255,59,48,.1);
  border-radius:18px;padding:22px 24px;animation:fadeUp .35s cubic-bezier(.16,1,.3,1);}
.blocked-text{font-size:14px;color:rgba(255,59,48,.5);line-height:1.7;}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(6px);
  background:rgba(8,8,14,.97);border:0.5px solid var(--w08);
  border-radius:100px;padding:9px 20px;font-size:11px;color:var(--w50);
  opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}


/* Live Pulse Feed */
.pulse-feed{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(12px);
  border-top:0.5px solid rgba(255,255,255,.06);
  padding:8px 24px;
  display:flex;align-items:center;justify-content:space-between;
  z-index:50;
  font-size:11px;color:rgba(255,255,255,.3);
}
.pf-left{display:flex;align-items:center;gap:8px;}
.pf-dot{width:5px;height:5px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px rgba(52,199,89,.8);animation:fp 2s ease-in-out infinite;}
.pf-right{font-size:10px;color:rgba(255,255,255,.2);}

/* Scanning state */
.scanning-text{
  display:none;font-size:12px;color:rgba(212,175,55,.5);
  text-align:center;padding:8px 0;letter-spacing:1px;
}
.scanning-text.on{display:block;}

/* Become Insider CTA */
.insider-cta{
  margin-top:8px;padding:12px 16px;
  background:rgba(52,199,89,.05);
  border:0.5px solid rgba(52,199,89,.15);
  border-radius:12px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  cursor:pointer;transition:all .15s;
}
.insider-cta:hover{background:rgba(52,199,89,.1);}
.ict-text{font-size:13px;color:rgba(52,199,89,.8);}
.ict-sub{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px;}
.ict-btn{padding:6px 14px;background:rgba(52,199,89,.1);border:0.5px solid rgba(52,199,89,.3);
  border-radius:100px;font-size:11px;color:var(--green);white-space:nowrap;font-weight:600;}

/* Responsive */
@media(max-width:600px){
  .hdr{padding:10px 16px;}
  .hdr-right .hdr-link{display:none;}
  .hero-title{font-size:26px;}
  .search-input{font-size:14px;padding:14px 52px 14px 18px;}
}
</style>
</head>

<script>
if (!firebase.apps.length) {

}
var db = firebase.firestore();

// ── CONSTANTE ──────────────────────────────────────────────────

var RO = { latMin:43.6, latMax:48.3, lngMin:20.2, lngMax:30.0 };

var _gps = null;

var _activeLayer = null;
var _alias = localStorage.getItem('vv_alias');

try {

} catch(e) {}

  urgent: { label:'Urgent', color:'var(--c-urgent)', tags:['coadă','aglomerat','liber','timp','rapid','acum','urgent'], hint:'Mod urgent activ — răspunsuri prioritizate.' },
  biz:    { label:'Business', color:'var(--c-biz)',    tags:['livrare','pickup','marfă','furnizor','business','firma','client'], hint:'Context business — Nexus caută date relevante pentru profesioniști.' },
  safe:   { label:'Siguranță', color:'var(--c-safe)',  tags:['sigur','pericol','poliție','iluminat','noaptea','zonă','accident'], hint:'Siguranță activă — Nexus filtrează date despre condiții și siguranță urbană.' }
};

// ── IndexedDB cu purjare 24h ──────────────────────────────────
function openIDB() {
  return new Promise(function(res) {
    try {
      var r = indexedDB.open('vvnow2', 2);
      r.onupgradeneeded = function(e) {
        var d = e.target.result;
        if (!d.objectStoreNames.contains('loc')) d.createObjectStore('loc', {keyPath:'k'});
        if (!d.objectStoreNames.contains('ephemeral')) d.createObjectStore('ephemeral', {keyPath:'k'});
      };
      r.onsuccess = function(e) { _idb = e.target.result; purgeEphemeral(); res(); };
      r.onerror = function() { res(); };
    } catch(e) { res(); }
  });
}

function idbGet(store, k) {
  return new Promise(function(res) {
    if (!_idb) { res(null); return; }
    try {
      var r = _idb.transaction(store,'readonly').objectStore(store).get(k);
      r.onsuccess = function() {
        var d = r.result;
        if (!d) { res(null); return; }
        if (Date.now() - d.ts > TTL_24H) { idbDel(store, k); res(null); return; }
        res(d.v);
      };
      r.onerror = function() { res(null); };
    } catch(e) { res(null); }
  });
}

function idbSet(store, k, v) {
  if (!_idb) return;
  try { _idb.transaction(store,'readwrite').objectStore(store).put({k,v,ts:Date.now()}); } catch(e) {}
}

function idbDel(store, k) {
  if (!_idb) return;
  try { _idb.transaction(store,'readwrite').objectStore(store).delete(k); } catch(e) {}
}

// Purjare automata la deschidere — sterge tot ce e mai vechi de 24h
function purgeEphemeral() {
  if (!_idb) return;
  try {
    var stores = ['loc','ephemeral'];
    stores.forEach(function(store) {
      var tx = _idb.transaction(store,'readwrite');
      var os = tx.objectStore(store);
      os.openCursor().onsuccess = function(e) {
        var cursor = e.target.result;
        if (!cursor) return;
        if (Date.now() - cursor.value.ts > TTL_24H) cursor.delete();
        cursor.continue();
      };
    });
  } catch(e) {}
}

// ── NOMINATIM cu cache ────────────────────────────────────────
async function findLoc(q) {
  var term = getTerm(q);
  if (!term) return null;
  var ck = 'loc_'+term.toLowerCase().replace(/\s+/g,'_');
  var cached = await idbGet('loc', ck);
  if (cached) return cached;
  try {
    var url = 'https://nominatim.openstreetmap.org/search?format=json&q='+
      encodeURIComponent(term)+'&limit=1&accept-language=ro&countrycodes=ro';
    if (_gps) url += '&viewbox='+(_gps.lng-.15)+','+(_gps.lat+.15)+','+(_gps.lng+.15)+','+(_gps.lat-.15)+'&bounded=0';
    var r = await fetch(url);
    var d = await r.json();
    if (d && d[0]) { idbSet('loc', ck, d[0]); return d[0]; }
  } catch(e) {}
  return null;
}

function getTerm(q) {
  var map = {
    'kaufland':'Kaufland','lidl':'Lidl','penny':'Penny Market','profi':'Profi',
    'mega':'Mega Image','auchan':'Auchan','carrefour':'Carrefour',
    'parcare':'parcare','teren':'teren sport','fotbal':'teren fotbal',
    'cafenea':'cafenea','restaurant':'restaurant','pizza':'pizza',
    'parc':'parc','mall':'mall','spital':'spital','farmacie':'farmacie',
    'atm':'ATM bancomat','lift':'lift statie metrou',
    'centrul vechi':'Centrul Vechi Bucuresti',
    'floreasca':'Floreasca Bucuresti','victoriei':'Piata Victoriei',
    'unirii':'Piata Unirii','herastrau':'Herastrau',
    'obor':'Piata Obor','tineretului':'Parcul Tineretului',
    'trafic':'strada Bucuresti','kiseleff':'Kiseleff'
  };
  var l = q.toLowerCase();
  for (var k in map) { if (l.includes(k)) return map[k]; }
  return q.split(' ').slice(0,4).join(' ');
}

// ── FIREBASE MISSIONS ────────────────────────────────────────
async function findMissions(q, layer) {
  try {
    var ago30 = new Date(Date.now()-30*24*60*60*1000);
    var snap = await db.collection('missions')
      .where('status','==','approved')
      .where('createdAt','>=',firebase.firestore.Timestamp.fromDate(ago30))
      .orderBy('createdAt','desc').limit(5).get();

    var term = getTerm(q).toLowerCase().split(' ')[0];
    var layerTags = layer ? LAYERS[layer].tags : [];
    var results = [];

    snap.forEach(function(doc) {
      var d = doc.data();
      var text = ((d.location||'')+(d.description||'')).toLowerCase();
      var matchesTerm = term.length > 2 && text.includes(term);
      var matchesLayer = layerTags.some(function(t){ return text.includes(t); });
      if (matchesTerm || matchesLayer) results.push(d);
    });
    return results.slice(0,3);
  } catch(e) { return []; }
}

    var pulse = document.createElement('div');
    pulse.style.cssText = 'margin-top:8px;padding:10px 14px;background:rgba(52,199,89,.04);border:0.5px solid rgba(52,199,89,.1);border-radius:10px;font-size:11px;color:rgba(255,255,255,.3);display:flex;align-items:center;gap:8px;';
    pulse.innerHTML = '<div style="width:5px;height:5px;border-radius:50%;background:#34c759;box-shadow:0 0 6px rgba(52,199,89,.6);flex-shrink:0;animation:fp 1.5s ease-in-out infinite"></div>Ultima verificare: <span style="color:rgba(255,255,255,.5)">' + loc + '</span> · acum ' + ago + ' min';
    feed.appendChild(pulse);
  } catch(e) {}
}

// ── LOG ───────────────────────────────────────────────────────
function logSearch(q, status) {
  db.collection('vvhi_dataset').add({
    action:'VV_NOW_SEARCH',
    context:{query:q.substring(0,100), status, layer:_activeLayer||null, hour:new Date().getHours()},
    timestamp:firebase.firestore.FieldValue.serverTimestamp()
  }).catch(function(){});
}

// ── BACK ──────────────────────────────────────────────────────
function goBack() {
  document.getElementById('hero').classList.remove('compact');
  document.getElementById('hdr').classList.remove('solid');
  document.getElementById('results').classList.remove('show');
  document.getElementById('results').innerHTML='';
  document.getElementById('search-input').value='';
  document.getElementById('back-btn').classList.remove('show');
  renderHist();
  setTimeout(function(){ document.getElementById('search-input').focus(); }, 400);
}

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(t._t); t._t=setTimeout(function(){ t.classList.remove('on'); },3000);
}

// ── KEYBOARD ──────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key==='Escape') goBack();
  if (e.key==='/' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
    e.preventDefault();
    document.getElementById('search-input').focus();
  }
});

// ── SCROLL ────────────────────────────────────────────────────
window.addEventListener('scroll', function() {
  var hdr = document.getElementById('hdr');
  if (window.scrollY > 20) hdr.classList.add('solid');
  else if (!document.getElementById('hero').classList.contains('compact')) hdr.classList.remove('solid');
});

// ── INIT ──────────────────────────────────────────────────────
openIDB().then(function() {
  getGPS();
  renderHist();
  loadPulseFeed();
});

async function loadPulseFeed() {
  try {
    var snap = await db.collection('vvhi_dataset')
      .orderBy('timestamp','desc').limit(1).get();
    if (snap.empty) return;
    var d = snap.docs[0].data();
    var ago = '';
    if (d.timestamp) {
      var diff = Math.floor((Date.now()-d.timestamp.toDate().getTime())/60000);
      ago = diff<1?'acum':diff<60?diff+' min ago':Math.floor(diff/60)+'h ago';
    }
    var actions = {
      'VV_NOW_SEARCH':'Cineva a căutat în VV NOW',
      'VV_PULSE_CONNECT':'Pulse confirmat',
      'VERIFY_REQUESTED':'Misiune Flash lansată',
      'APPROVE_MISSION':'Verificare completată',
      'CIRCLE_DEPLOY':'Nou Fondator activat'
    };
    var txt = actions[d.action] || 'Activitate în ecosistem';
    var pfText = document.getElementById('pf-text');
    var pfRight = document.getElementById('pf-right');
    if (pfText) pfText.textContent = txt + ' · ' + ago;
    if (pfRight) pfRight.textContent = 'VV NOW Beta · Live';
  } catch(e) {}
}
</script>

  <div class="pf-left">
    <div class="pf-dot"></div>
    <span id="pf-text">Ecosistem activ</span>
  </div>
  <div class="pf-right" id="pf-right">VV NOW Beta</div>
</div>
